<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Travel Vertical Bubble Stack</title>
<style>
:root{
  --phone-w:402px;
  --phone-h:874px;
  --ink:#fffdf7;
  --muted:rgba(255,255,255,.6);
  --glass:rgba(255,255,255,.18);
  --shadow:0 36px 90px rgba(59,53,38,.18);
  --ease:cubic-bezier(.22,.88,.24,1);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:#f0ede6;
  color:var(--ink);
  font-family:"Avenir Next","Helvetica Neue",ui-sans-serif,sans-serif;
}
body{
  display:grid;
  place-items:center;
  overflow:hidden;
}
button{font:inherit;color:inherit}
.prototype-shell{
  display:flex;
  align-items:center;
  gap:28px;
}
.phone{
  position:relative;
  width:min(var(--phone-w),100vw);
  height:min(var(--phone-h),100vh);
  aspect-ratio:402/874;
  overflow:hidden;
  isolation:isolate;
  touch-action:none;
  background:linear-gradient(180deg,#eeeeee 0%,#c1c1c1 100%);
  box-shadow:0 26px 80px rgba(0,0,0,.18);
}
.backdrop{
  position:absolute;
  inset:-18%;
  background:
    linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.04) 28%,rgba(30,24,14,.1) 100%),
    var(--home-bg-image,none) center/cover no-repeat;
  filter:blur(12px) saturate(1.04);
  transform:scale(1.16);
}
.backdrop::after{
  content:"";
  position:absolute;
  inset:-4%;
  background:linear-gradient(180deg,rgba(49,49,49,.06),rgba(24,24,24,.1) 100%);
}
.grain{
  position:absolute;
  inset:0;
  opacity:.2;
  background-image:
    radial-gradient(rgba(255,255,255,.65) .45px,transparent .45px),
    radial-gradient(rgba(94,86,67,.18) .45px,transparent .45px);
  background-position:0 0,8px 8px;
  background-size:16px 16px;
  pointer-events:none;
  mix-blend-mode:soft-light;
}
.home-screen,
.stack-screen,
.open-transition{
  position:absolute;
  inset:0;
}
.home-screen{
  z-index:2;
  transition:opacity .42s ease,filter .62s ease;
  will-change:opacity,filter;
}
.stack-screen{
  z-index:3;
  opacity:0;
  pointer-events:none;
  clip-path:circle(var(--open-radius,0px) at var(--open-x,50%) var(--open-y,50%));
  -webkit-clip-path:circle(var(--open-radius,0px) at var(--open-x,50%) var(--open-y,50%));
  transition:
    opacity .18s linear,
    clip-path 1500ms var(--ease),
    -webkit-clip-path 1500ms var(--ease);
}
.stack-bg,
.stack-bg-alt{
  position:absolute;
  inset:-18%;
  z-index:0;
  pointer-events:none;
  background:
    linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.04) 28%,rgba(30,24,14,.1) 100%),
    var(--stack-bg-image,none) center/cover no-repeat;
  filter:blur(12px) saturate(1.04);
  transform:scale(1.16);
  opacity:0;
  transition:
    opacity 520ms var(--ease),
    filter 520ms var(--ease);
}
.stack-bg::after,
.stack-bg-alt::after{
  content:"";
  position:absolute;
  inset:-4%;
  background:linear-gradient(180deg,rgba(49,49,49,.06),rgba(24,24,24,.1) 100%);
}
.back-button,
.day-pill,
.stack-task-title,
.stack,
.prompt{
  z-index:1;
}
.phone.is-stack-opening .stack-screen,
.phone.is-stack .stack-screen{
  opacity:1;
  pointer-events:auto;
}
.phone.is-stack-opening .stack-screen{
  clip-path:circle(var(--open-cover,120%) at var(--open-x,50%) var(--open-y,50%));
  -webkit-clip-path:circle(var(--open-cover,120%) at var(--open-x,50%) var(--open-y,50%));
}
.phone.is-stack .stack-screen{
  clip-path:none;
  -webkit-clip-path:none;
  transition:none;
}
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .back-button,
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .day-pill,
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .stack-task-title,
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .bubble-card,
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .prompt{
  opacity:0;
  animation:none;
}
.phone.is-stack .stack-screen .back-button,
.phone.is-stack .stack-screen .day-pill,
.phone.is-stack .stack-screen .stack-task-title,
.phone.is-stack-entering .stack-screen .back-button,
.phone.is-stack-entering .stack-screen .day-pill,
.phone.is-stack-entering .stack-screen .stack-task-title{
  opacity:1;
}
.phone.is-stack .stack-screen .bubble-card,
.phone.is-stack-entering .stack-screen .bubble-card{
  opacity:var(--opacity,1);
}
.phone.is-stack-entering .back-button{
  animation:stackBackEnter .56s var(--ease) both;
  animation-delay:0s;
}
.phone.is-stack-entering .day-pill{
  animation:stackPillEnter .72s var(--ease) both;
  animation-delay:0s;
}
.phone.is-stack-entering .bubble-card{
  animation:stackCardEnter .86s var(--ease) both;
}
.phone.is-stack-entering .bubble-card.is-prev{animation-delay:.04s}
.phone.is-stack-entering .bubble-card.is-active{animation-delay:.1s}
.phone.is-stack-entering .bubble-card.is-next{animation-delay:.22s}
.phone.is-stack-entering .bubble-card.is-next2{animation-delay:.34s}
.phone.is-stack-entering .bubble-card.is-hidden{animation-delay:.46s}
.phone.is-stack-closing .stack-screen{
  pointer-events:none;
  animation:stackScreenExit .72s cubic-bezier(.22,.88,.24,1) forwards;
  transform-origin:50% 52%;
}
.phone.is-detail-view .stack-screen .back-button,
.phone.is-detail-view .stack-screen .day-pill,
.phone.is-detail-view .stack-screen .stack-task-title,
.phone.is-detail-view .stack-screen .bubble-card{
  opacity:0!important;
  pointer-events:none!important;
  transition:opacity .24s ease,filter .24s ease,transform .24s ease;
  filter:blur(12px);
}
.phone.is-stack-opening .home-screen,
.phone.is-stack .home-screen{
  opacity:0;
  filter:blur(10px);
  pointer-events:none;
}
.phone.is-stack-closing .home-screen{
  opacity:1;
  filter:blur(0);
  pointer-events:none;
}
.phone.is-stack-opening .home-screen > :not(.golf-home){
  opacity:0;
  transition:opacity .32s ease;
}
.phone.is-stack-closing .home-bubble:not(.golf-home){
  opacity:0;
}
.phone.is-stack-closing .golf-home{
  opacity:1;
}
.phone.is-home-entering .home-bubble:not(.golf-home){
  animation:homeBubbleReturn .74s var(--ease) both;
  transform-origin:50% 50%;
}
.phone.is-home-entering .assistant-home{animation-delay:.02s}
.phone.is-home-entering .weather-home{animation-delay:.18s}
.phone.is-home-entering .grooming-home{animation-delay:.28s}
.phone.is-home-entering .cooking-home{animation-delay:.38s}
.phone.is-home-entering .golf-home{
  opacity:1;
  scale:1;
  filter:blur(0);
}
.back-button{
  position:absolute;
  left:22px;
  top:20px;
  width:48px;
  height:48px;
  border:0;
  border-radius:50%;
  color:#fff;
  background:rgba(0,0,0,.2);
  box-shadow:none;
  -webkit-backdrop-filter:none;
  backdrop-filter:none;
  display:grid;
  place-items:center;
  z-index:6;
}
.back-button svg{
  width:23px;
  height:23px;
  stroke:currentColor;
  stroke-width:2.4;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.open-transition{
  z-index:5;
  display:none;
  border-radius:50%;
  background:
    linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.03) 38%,rgba(16,14,10,.18)),
    var(--open-image) center/cover no-repeat;
  box-shadow:0 26px 72px rgba(56,46,24,.26);
  left:var(--open-left,0px);
  top:var(--open-top,0px);
  width:var(--open-size,0px);
  height:var(--open-size,0px);
}
.phone.is-stack-opening .open-transition,
.phone.is-stack-closing .open-transition{
  display:block;
}
.phone.is-stack-opening .open-transition{
  animation:openBubbleExpand 1500ms var(--ease) forwards;
}
.phone.is-stack-closing .open-transition{
  z-index:2;
  animation:closeBubbleCollapse 900ms var(--ease) forwards;
}
.home-bubble{
  position:absolute;
  border:0;
  padding:0;
  margin:0;
  background:none;
  cursor:grab;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  will-change:transform,opacity;
}
.home-bubble.is-dragging{cursor:grabbing}
.home-bubble::before{
  content:none;
}
.home-bubble img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  border-radius:inherit;
  pointer-events:none;
  user-select:none;
}
.context-home{
  width:180px;
  height:180px;
  padding:76px 24px 20px;
  border-radius:50%;
  color:#fff;
  background:rgba(255,255,255,.1);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  text-align:center;
  overflow:hidden;
}
.context-message{
  left:20px;
  top:602px;
  animation-delay:-.7s;
}
.context-weather{
  left:246px;
  top:92px;
  width:142px;
  height:142px;
  padding:68px 16px 14px;
  animation-delay:-1.8s;
}
.context-thumb{
  position:absolute;
  top:20px;
  left:50%;
  width:48px!important;
  height:48px!important;
  transform:translateX(-50%);
  object-fit:contain!important;
  border-radius:50%!important;
}
.context-weather .context-thumb{
  top:20px;
  width:42px!important;
  height:42px!important;
}
.context-title,
.context-copy{
  display:block;
}
.context-title{
  font-size:15px;
  line-height:1.3;
  font-weight:500;
}
.context-copy{
  margin-top:5px;
  font-size:15px;
  line-height:1.3;
  font-weight:400;
  color:rgba(255,255,255,.86);
}
.context-message .context-title{
  font-size:15px;
  line-height:1.28;
}
.context-weather .context-title{
  font-size:14px;
  white-space:nowrap;
}
.context-weather .context-copy{
  margin-top:3px;
  font-size:36px;
  line-height:1;
  font-weight:400;
  color:#fff;
}
.task-home{
  color:#fff;
  border-radius:50%;
  background:rgba(255,255,255,.1);
  box-shadow:
    0 0 14px rgba(255,255,255,1),
    inset 0 0 20px rgba(255,255,255,1);
  overflow:hidden;
}
.task-home::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:4;
  border-radius:inherit;
  box-shadow:inset 0 0 20px rgba(255,255,255,1);
  pointer-events:none;
}
.golf-home{
  left:154px;
  top:304px;
  width:282px;
  height:282px;
  border-radius:50%;
  animation-delay:-1.1s;
}
.golf-home::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:linear-gradient(180deg,rgba(0,0,0,.28),rgba(0,0,0,0) 44%,rgba(0,0,0,.08));
  z-index:2;
  pointer-events:none;
}
.ai-generation-field{
  position:absolute;
  inset:-2px;
  z-index:1;
  overflow:hidden;
  border-radius:49% 51% 46% 54% / 53% 47% 55% 45%;
  pointer-events:none;
  animation:aiFieldBreathe 6.8s ease-in-out infinite alternate;
}
.ai-generation-field::before{
  content:"";
  position:absolute;
  inset:-5px;
  border-radius:inherit;
  background:conic-gradient(
    from -20deg,
    transparent 0 38%,
    rgba(208,239,255,.08) 46%,
    rgba(231,247,255,.3) 56%,
    rgba(255,255,255,.98) 67%,
    rgba(255,255,255,.48) 75%,
    rgba(211,239,255,.12) 83%,
    transparent 91% 100%
  );
  -webkit-mask:radial-gradient(
    farthest-side,
    transparent calc(100% - 42px),
    rgba(0,0,0,.18) calc(100% - 37px),
    #000 calc(100% - 24px),
    rgba(0,0,0,.72) calc(100% - 8px),
    #000 100%
  );
  mask:radial-gradient(
    farthest-side,
    transparent calc(100% - 42px),
    rgba(0,0,0,.18) calc(100% - 37px),
    #000 calc(100% - 24px),
    rgba(0,0,0,.72) calc(100% - 8px),
    #000 100%
  );
  filter:blur(5px);
  opacity:.9;
  animation:aiRibbonOrbit 5.6s cubic-bezier(.42,0,.2,1) infinite;
}
.ai-generation-field::after{
  content:"";
  position:absolute;
  inset:18% 9%;
  border-radius:46% 54% 51% 49%;
  background:linear-gradient(
    108deg,
    transparent 24%,
    rgba(221,244,255,0) 38%,
    rgba(234,249,255,.14) 50%,
    rgba(255,255,255,.2) 54%,
    rgba(221,244,255,0) 67%,
    transparent 76%
  );
  filter:blur(12px);
  opacity:0;
  animation:aiThoughtSweep 5.6s ease-in-out infinite;
}
.golf-home[data-loading-motion="aurora"] .ai-generation-field::before{display:none}
.aurora-loading-canvas{
  position:absolute;
  left:-15%;
  top:-15%;
  z-index:1;
  display:none;
  width:130%;
  height:130%;
  pointer-events:none;
}
.golf-home[data-loading-motion="aurora"] .aurora-loading-canvas{display:block}
.golf-home-media{
  position:absolute;
  inset:0;
  z-index:0;
  transition:opacity 1200ms var(--ease),transform 1800ms var(--ease),filter 1800ms var(--ease);
}
.golf-home-media img{
  position:absolute;
  inset:0;
  object-position:center 38%;
}
.golf-home-base{
  opacity:1;
  transform:scale(1);
  filter:blur(0);
}
.golf-home-active{
  opacity:1;
  transform:scale(1);
  filter:none;
}
.golf-home.is-preview-active .golf-home-base{
  opacity:1;
  transform:scale(1);
  filter:none;
}
.golf-home.is-preview-active .golf-home-active{
  opacity:1;
  transform:scale(1);
  filter:none;
}
.golf-home .home-pill{display:none}
.golf-home .home-pill,
.golf-home .home-title{
  transition:opacity 900ms ease,transform 1600ms var(--ease),filter 1600ms var(--ease);
}
.golf-home .home-pill .pill-status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex:0 0 auto;
  background:var(--pill-dot,#ff9f2f);
  box-shadow:
    0 0 0 5px color-mix(in srgb,var(--pill-dot,#ff9f2f) 18%,transparent),
    0 0 18px color-mix(in srgb,var(--pill-dot,#ff9f2f) 44%,transparent);
  transition:background .42s var(--ease),box-shadow .42s var(--ease);
}
.golf-home .home-pill .pill-copy{
  white-space:nowrap;
}
.golf-home .home-pill.is-chip-transitioning{
  opacity:0;
  filter:blur(8px);
  transform:translateX(-50%) translateY(-8px) scale(.96);
}
.golf-home .home-title.is-label-transitioning{
  opacity:0;
  filter:blur(8px);
  transform:translateY(10px) scale(.96);
}
.golf-home .home-pill.is-alt,
.golf-home .home-title.is-alt{
  opacity:0;
  filter:blur(10px);
  transform:translateX(-50%) translateY(10px) scale(.96);
}
.golf-home .home-title.is-alt{
  transform:translateY(10px) scale(.96);
}
.golf-home.is-preview-active .home-pill.is-base,
.golf-home.is-preview-active .home-title.is-base{
  opacity:0;
  filter:blur(10px);
}
.golf-home.is-preview-active .home-pill.is-base{
  transform:translateX(-50%) translateY(-8px) scale(.96);
}
.golf-home.is-preview-active .home-title.is-base{
  transform:translateY(10px) scale(.96);
}
.golf-home.is-preview-active .home-pill.is-alt,
.golf-home.is-preview-active .home-title.is-alt{
  opacity:1;
  filter:blur(0);
}
.golf-home.is-preview-active .home-pill.is-alt{
  transform:translateX(-50%) translateY(0) scale(1);
}
.golf-home.is-preview-active .home-title.is-alt{
  transform:translateY(0) scale(1);
}
.golf-home.is-scene-transitioning .golf-home-active,
.golf-home.is-scene-transitioning .home-pill.is-alt,
.golf-home.is-scene-transitioning .home-title.is-alt{
  opacity:0;
  filter:blur(10px);
}
.golf-home.is-scene-transitioning .golf-home-active{
  transform:scale(1.08);
}
.golf-home.is-scene-transitioning .home-pill.is-alt{
  transform:translateX(-50%) translateY(-8px) scale(.96);
}
.golf-home.is-scene-transitioning .home-title.is-alt{
  transform:translateY(10px) scale(.96);
}
.golf-home .home-title{
  position:absolute;
  left:24px;
  right:24px;
  top:48px;
  bottom:auto;
  z-index:3;
  text-align:center;

}

  padding:42px 24px 12px;

}

}
.grooming-home{

.task-asset{

.spark-home{

.spark-home img{

}
.desktop-panel{

  padding:20px;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.1),

}
.loading-options{

  border-radius:8px;

.loading-options h2{

.loading-switcher{
  display:grid;

.loading-option{
  min-height:40px;
  border:0;
  border-radius:6px;
  background:transparent;
  color:rgba(255,255,255,.62);
  font-size:13px;

  function auroraContext(cv){
    if(!cv) return null;
    const ctx=cv.getContext('2d');
    const s=cv.width;
    ctx.clearRect(0,0,s,s);
    return {ctx,s,c:s/2};
  }

  function drawAuroraGuideRing(ctx,c,R,alpha){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.beginPath();
    ctx.arc(c,c,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(150,175,225,'+alpha+')';
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.restore();
  }

  function drawAuroraArc(cv,t){
    const o=auroraContext(cv);
    if(!o) return;
    const {ctx,s,c}=o;
    const R=s*.34;
    drawAuroraGuideRing(ctx,c,R,.05);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const arcs=[
      {sp:.7,ph:0,band:0,col:[220,235,255]},
      {sp:.55,ph:1.4,band:.10,col:[170,200,255]}
    ];
    for(const arc of arcs){
      const lead=t*arc.sp+arc.ph;
      const span=Math.PI*1.05;
      const steps=60;
      for(let i=0;i<=steps;i++){
        const p=i/steps;
        const ang=lead-p*span;
        const env=Math.sin(p*Math.PI);
        const wob=Math.sin(ang*4+t*1.1)*.05;
        const rad=R*(1+wob)+R*arc.band;
        const x=c+Math.cos(ang)*rad;
        const y=c+Math.sin(ang)*rad;
        const size=R*.22*(.5+env);
        const a=.16*env;
        const g=ctx.createRadialGradient(x,y,0,x,y,size);
        g.addColorStop(0,'rgba('+arc.col[0]+','+arc.col[1]+','+arc.col[2]+','+a+')');
        g.addColorStop(1,'rgba('+arc.col[0]+','+arc.col[1]+','+arc.col[2]+',0)');
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(x,y,size,0,Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

    return String(text || '').replace(/<[^>]+>/g,'');
  }

  function runnerStateName(runner){
    if(runner.status==='waiting') return 'wait';
    if(runner.status==='done') return 'done';
    if(runner.status==='paused') return 'paused';
    return 'run';
  }

  function runnerStatusToken(runner){
    const state=runnerStateName(runner);
    if(state==='wait') return 'needs-input';
    if(state==='done') return 'completed';
    if(state==='paused') return 'ongoing';
    return 'ongoing';
  }

  function runnerDayPillText(runner){
    const state=runnerStateName(runner);
    return state==='wait' ? 'Needs your decision' : state==='done' ? 'Done' : state==='paused' ? 'Paused' : 'Working';
  }

  function runnerBubbleChipText(runner){
    const state=runnerStateName(runner);
    return state==='wait' ? 'Needs input' : state==='done' ? 'Done' : state==='paused' ? 'Paused' : 'Working';
  }

  function runnerLatestSummary(runner,fallbackTitle,fallbackBody){
    if(!runner.latest){
      return {title:fallbackTitle,body:fallbackBody};
    }
    if(runner.latest.rows){
      return {title:runner.latest.title,body:runner.latest.rows.length+' options found.'};
    }
    return {title:runner.latest.title,body:stripInlineMarkup(runner.latest.body)};
  }

  function scheduleCardHeightSyncForNode(node){
    const card=node?.closest?.('.bubble-card');
    if(!card) return;
    const index=cards.indexOf(card);
    if(index<0) return;
    const previous=cardHeightSyncRafs.get(index);
    if(previous) cancelAnimationFrame(previous);
    const rafId=requestAnimationFrame(()=>{
      cardHeightSyncRafs.delete(index);
      syncActiveCardHeight(index);
    });
    cardHeightSyncRafs.set(index,rafId);
  }

  function animateTextSwap(node,nextValue){
    if(!node) return;
    const nextText=String(nextValue ?? '');
    if(node.textContent===nextText) return;
    scheduleCardHeightSyncForNode(node);
    node.animate(
      [
        {opacity:1,transform:'translateY(0)'},
        {opacity:0,transform:'translateY(6px)'}
      ],
      {duration:120,easing:'ease',fill:'forwards'}
    );
    window.setTimeout(()=>{
      node.textContent=nextText;
      scheduleCardHeightSyncForNode(node);
      node.animate(
        [
          {opacity:0,transform:'translateY(-6px)'},
          {opacity:1,transform:'translateY(0)'}
        ],
        {duration:220,easing:'cubic-bezier(.2,.8,.2,1)',fill:'both'}
      );
      requestAnimationFrame(()=>scheduleCardHeightSyncForNode(node));
    },110);
  }

  function animateMarkSwap(node,nextValue){
    if(!node) return;
    const nextText=String(nextValue ?? '');
    if(node.textContent===nextText) return;
    scheduleCardHeightSyncForNode(node);
    node.animate(
      [
        {opacity:1,transform:'scale(1)'},
        {opacity:0,transform:'scale(.72)'}
      ],
      {duration:110,easing:'ease',fill:'forwards'}
    );
    window.setTimeout(()=>{
      node.textContent=nextText;
      scheduleCardHeightSyncForNode(node);
      node.animate(
        [
          {opacity:0,transform:'scale(1.18)'},
          {opacity:1,transform:'scale(1)'}
        ],
        {duration:220,easing:'cubic-bezier(.2,.8,.2,1)',fill:'both'}
      );
      requestAnimationFrame(()=>scheduleCardHeightSyncForNode(node));
    },100);
  }

  function syncCardFromRunner(item,runner){
    const refs=cardRefsByKey.get(item.key);
    if(!refs) return;
    const statusName=runnerStatusToken(runner);
    const status=statusTokens[statusName] || statusTokens.ongoing;
    const state=runnerStateName(runner);
    const fallback=item.content[0];
    refs.card.style.setProperty('--status-color',status.color);
    refs.card.style.setProperty('--status-glow',status.glow);

    if(refs.stepCount){
      refs.stepCount.textContent=runner.stepsDone()+' of '+runner.steps()+' steps';
    }
    if(refs.nowRow) refs.nowRow.classList.toggle('is-plain',!shouldShowTravelNowChrome(statusName));
    if(refs.nowMark) animateMarkSwap(refs.nowMark,travelNowMark(statusName));
    if(refs.nowLabel) animateTextSwap(refs.nowLabel,state==='wait' ? 'Waiting on you' : state==='done' ? 'Result' : state==='paused' ? 'Paused' : 'Now');
    if(refs.nowText) animateTextSwap(refs.nowText,runner.status==='idle' ? fallback.nowText : runner.current);
    if(refs.actionLabels[0]) animateTextSwap(refs.actionLabels[0],'Open');
    const shouldSingleAction=true;

    }

    if(actionsRow){
      actionsRow.classList.add('is-single');

  function createDetailRunner(item){
    const detail=item.fullView;
    return {
      item,
      timeline:detail.timeline,
      title:detail.title,
      sub:detail.sub,
      log:[],
      index:0,
      status:'idle',
      current:'Queued',
      lastRunningCurrent:'Queued',
      latest:null,
      secs:0,
      startedAt:0,
      timer:0,
      pendingEvent:null,
      remainingDelay:0,
      dueAt:0,
      subs:[],
      on(fn){
        this.subs.push(fn);
        return fn;
      },
      off(fn){
        this.subs=this.subs.filter(entry=>entry!==fn);
      },
      answer(label){
        const fork=this.log[this.log.length-1];
        if(fork && fork.type==='fork'){
          fork.answered=label;
        }
        this.status='running';
        this.current='Resuming…';
        this.lastRunningCurrent=this.current;
        this.emit();
        this.next();
      },
      cancel(){
        window.clearTimeout(this.timer);
        this.timer=0;
        this.pendingEvent=null;
        this.remainingDelay=0;
        this.dueAt=0;
      },
      pause(){
        if(this.status!=='running' || !this.pendingEvent) return;
        window.clearTimeout(this.timer);
        this.timer=0;
        this.remainingDelay=Math.max(0,this.dueAt-Date.now());
        this.status='paused';
        this.current='Paused';
        this.emit();
      },
      resume(){
        if(this.status!=='paused' || !this.pendingEvent) return;
        this.status='running';
        this.current=this.lastRunningCurrent || 'Resuming…';
        this.emit();
        this.schedulePending(this.pendingEvent,this.remainingDelay || 0);
      },
      emit(){
        this.subs.forEach(fn=>fn(this));
        paintDetailRunner(this);
      },
      schedulePending(event,delay){
        this.pendingEvent=event;
        this.remainingDelay=delay;
        this.dueAt=Date.now()+delay;
        this.timer=window.setTimeout(()=>{
          this.timer=0;
          this.pendingEvent=null;
          this.remainingDelay=0;
          this.dueAt=0;
          this.log.forEach(entry=>{
            if(entry.type==='step') entry.done=true;
          });
          this.index+=1;
          if(event.type==='step'){
            this.log.push({type:'step',text:event.text,done:false});
            this.current=event.text;
            this.lastRunningCurrent=event.text;
            this.status='running';
            this.emit();
            this.next();
            return;
          }
          if(event.type==='find'){
            this.log.push({type:'find',event});
            this.latest=event;
            this.status='running';
            this.emit();
            this.next();
            return;
          }
          if(event.type==='fork'){
            this.log.push({type:'fork',event});
            this.status='waiting';
            this.current=event.q;
            this.emit();
            return;
          }
          if(event.type==='done'){
            this.log.push({type:'done',event});
            this.status='done';
            this.current=event.sub;
            this.secs=Math.round((Date.now()-this.startedAt)/1000);
            this.emit();
          }
        },delay);
      },
      next(){
        if(this.index>=this.timeline.length) return;
        const event=this.timeline[this.index];
        this.schedulePending(event,event.t);
      },
      start(){
        if(this.status!=='idle') return;
        this.status='running';
        this.startedAt=Date.now();
        this.emit();
        this.next();
      },
      steps(){
        return this.timeline.filter(entry=>entry.type==='step').length;
      },
      stepsDone(){
        return this.log.filter(entry=>entry.type==='step').length;
      }
    };
  }

  function renderDetailLogEntry(logEntry,index,runner){
    if(logEntry.type==='step'){
      return '<div class="detail-step is-active detail-ev" data-step-index="'+index+'"><span class="detail-step-mark"><i></i></span><span class="detail-step-text">'+logEntry.text+'</span></div>';
    }
    if(logEntry.type==='find'){
      const event=logEntry.event;
      const rows=event.rows ? '<div class="detail-find-rows">'+event.rows.map(row=>'<div class="detail-find-row"><span class="detail-find-icon">'+row.icon+'</span><span><strong>'+row.title+'</strong><br><span style="font-size:12px;color:rgba(255,255,255,.46)">'+row.sub+'</span></span><span class="detail-find-right">'+row.right+'</span></div>').join('')+'</div>' : '';
      return '<div class="detail-find detail-ev"><p class="detail-find-title">'+event.title+'</p>'+(event.body ? '<div class="detail-find-body">'+event.body+'</div>' : '')+rows+'</div>';
    }
    if(logEntry.type==='fork'){
      const event=logEntry.event;
      return '<div class="detail-decision detail-ev" data-fork-index="'+index+'"><p class="detail-decision-tag">'+event.tag+'</p><div class="detail-decision-copy">'+event.q+'</div><div class="detail-options">'+event.options.map((option,optionIndex)=>'<button class="detail-option'+(option.picked ? ' is-picked' : '')+'" data-option-index="'+optionIndex+'" type="button"><span class="detail-option-icon">'+(['✈️','🔁','🌙'][optionIndex] || '•')+'</span><span class="detail-option-copy"><strong>'+option.label+'</strong><span>'+option.sub+'</span></span></button>').join('')+'</div></div>';
    }
    if(logEntry.type==='done'){
      const event=logEntry.event;
      return '<div class="detail-done detail-ev"><div class="detail-done-ring">✓</div><p class="detail-done-text">'+event.title+'</p><div class="detail-done-sub">'+event.sub+'</div><div class="detail-result"><p class="detail-done-title">Result</p>'+event.rows.map(row=>'<div class="detail-result-row"><span>'+row[0]+'</span><strong>'+row[1]+'</strong></div>').join('')+'</div><div class="detail-actions">'+event.acts.map((act,actIndex)=>'<button class="detail-action is-'+act[1]+'" type="button" data-done-action="'+actIndex+'">'+act[0]+'</button>').join('')+'</div></div>';
    }
    return '';
  }

  function paintDetailRunner(runner){
    if(activeDetailRunner!==runner) return;
    const state=runner.status==='waiting' ? 'wait' : runner.status==='done' ? 'done' : 'run';
    const tone=detailStateTone(state);
    const progressColor=detailProgressColor(tone);
    detailEye.style.color=progressColor;
    const eyeLabel=runner.status==='paused' ? 'Paused' : state==='wait' ? 'Needs your decision' : state==='done' ? 'Done' : 'Working';
    detailEye.innerHTML='<span class="pill-dot" style="display:inline-block;vertical-align:middle;margin-right:8px;background:'+progressColor+'"></span>'+eyeLabel;
    detailProgressBar.style.background=progressColor;
    detailProgressBar.style.width=((runner.index/runner.timeline.length)*100).toFixed(1)+'%';

    const rendered=Number(detailFeed.dataset.rendered || '0');
    for(let i=rendered;i<runner.log.length;i+=1){
      const wrapper=document.createElement('div');
      wrapper.innerHTML=renderDetailLogEntry(runner.log[i],i,runner);
      const node=wrapper.firstElementChild;
      if(node) detailFeed.appendChild(node);
    }
    detailFeed.dataset.rendered=String(runner.log.length);

    runner.log.forEach((entry,index)=>{
      if(entry.type==='step'){
        const node=detailFeed.querySelector('[data-step-index="'+index+'"]');
        if(node && entry.done && !node.classList.contains('is-done')){
          node.className='detail-step is-done';
          node.querySelector('.detail-step-mark').textContent='✓';
        }
      }
      if(entry.type==='fork' && entry.answered){
        const node=detailFeed.querySelector('[data-fork-index="'+index+'"]');
        if(node && !node.dataset.resolved){
          node.dataset.resolved='true';
          node.outerHTML='<div class="detail-step is-done"><span class="detail-step-mark">✓</span><span class="detail-step-text">You chose: <strong style="color:#fff">'+entry.answered+'</strong></span></div>';
        }
      }
    });

    detailFeed.querySelectorAll('[data-option-index]').forEach(button=>{
      if(button.dataset.bound==='true') return;
      button.dataset.bound='true';
      button.addEventListener('click',()=>{
        const fork=button.closest('[data-fork-index]');
        if(!fork || !activeDetailRunner) return;
        const forkIndex=Number(fork.dataset.forkIndex);
        const forkEntry=activeDetailRunner.log[forkIndex];
        const option=button.querySelector('strong')?.textContent || '';
        if(forkEntry?.type==='fork'){
          activeDetailRunner.answer(option);
        }
      });
    });

    detailFeed.querySelectorAll('[data-done-action]').forEach(button=>{
      if(button.dataset.bound==='true') return;
      button.dataset.bound='true';
      button.addEventListener('click',()=>{
        closeDetailView();
      });
    });

    detailFoot.style.display=state==='done' ? 'none' : '';
    if(state!=='done'){
      detailBody.scrollTop=detailBody.scrollHeight;
    }
  }

  function clamp(value,min,max){
    return Math.max(min,Math.min(max,value));
  }

  function lerp(a,b,t){
    return a+(b-a)*t;
  }

  function easeUnit(t){
    const n=clamp(t,0,1);
    return n*n*(3-2*n);
  }

  function ensureHomeBubbleLayout(){
    const phoneRect=phone.getBoundingClientRect();
    homeBubbles.forEach((node,index)=>{
      if(node.dataset.layoutReady==='true') return;
      const rect=node.getBoundingClientRect();
      const left=rect.left-phoneRect.left;
      const top=rect.top-phoneRect.top;
      node.style.left=left.toFixed(2)+'px';
      node.style.top=top.toFixed(2)+'px';
      node.style.width=rect.width.toFixed(2)+'px';
      node.style.height=rect.height.toFixed(2)+'px';
      node.style.right='auto';
      node.style.bottom='auto';
      node.dataset.layoutReady='true';
      homeBubbleState.set(node,{
        x:left,
        y:top,
        tx:left,
        ty:top,
        w:rect.width,
        h:rect.height,
        phase:index*1.17,
        speed:.82+(index%3)*.12
      });
    });
  }

  function homePoint(event){
    const rect=phone.getBoundingClientRect();
    return {
      x:(event.clientX-rect.left)*(phone.clientWidth/rect.width),
      y:(event.clientY-rect.top)*(phone.clientHeight/rect.height)
    };
  }

  function clampHomePanTargets(){
    const limitX=phone.clientWidth*.58;
    const limitY=phone.clientHeight*.58;
    for(let i=0;i<homeBubbles.length;i++){
      homePanTargetX[i]=clamp(homePanTargetX[i],-limitX,limitX);
      homePanTargetY[i]=clamp(homePanTargetY[i],-limitY,limitY);
    }
  }

  function setHomePanInfluence(origin){
    const maxDistance=Math.hypot(phone.clientWidth,phone.clientHeight)*.58;
    homeBubbles.forEach((node,index)=>{
      const state=homeBubbleState.get(node);
      if(!state){
        homePanInfluence[index]=1;
        return;
      }
      const centerX=state.x+state.w*.5+homePanOffsetX[index];
      const centerY=state.y+state.h*.5+homePanOffsetY[index];
      const radius=Math.min(state.w,state.h)*.5;
      const distance=Math.max(0,Math.hypot(origin.x-centerX,origin.y-centerY)-radius*.45);
      const t=clamp(distance/maxDistance,0,1);
      const eased=t*t*(3-2*t);
      homePanInfluence[index]=1-eased*.64;
    });
  }

  function renderHomeBubbles(now){
    if(phone.classList.contains('is-stack')) return;
    const t=now*.001;
    homeBubbles.forEach((node,index)=>{
      const state=homeBubbleState.get(node);
      if(!state) return;
      homePanOffsetX[index] += (homePanTargetX[index]-homePanOffsetX[index])*.105;
      homePanOffsetY[index] += (homePanTargetY[index]-homePanOffsetY[index])*.105;
      if(index===homeDragIndex){
        state.x += (homeDragTargetX-state.x)*.34;
        state.y += (homeDragTargetY-state.y)*.34;
      }
      const floatX=Math.sin(t*state.speed+state.phase)*2.6;
      const floatY=Math.cos(t*(state.speed*.88)+state.phase)*7.2;
      const dx=homePanOffsetX[index]+floatX;
      const dy=homePanOffsetY[index]+floatY;
      node.style.transform='translate3d('+dx.toFixed(2)+'px,'+dy.toFixed(2)+'px,0)';
      node.style.left=state.x.toFixed(2)+'px';
      node.style.top=state.y.toFixed(2)+'px';
    });
    requestAnimationFrame(renderHomeBubbles);
  }

  function resetHomeInteractionState(){
    if(homeActivePointerId!==null && homeScreen.hasPointerCapture(homeActivePointerId)){
      homeScreen.releasePointerCapture(homeActivePointerId);
    }
    homeBubbles.forEach(node=>node.classList.remove('is-dragging'));
    homeDragIndex=-1;
    homePanning=false;
    homeActivePointerId=null;
    homePanVelX=0;
    homePanVelY=0;
    homeGestureMoved=false;
  }

  function openStackFromHome(){
    if(phone.classList.contains('is-stack-opening') || phone.classList.contains('is-stack') || phone.classList.contains('is-stack-closing')) return;
    if(!runnersStarted){
      taskRunners.forEach(runner=>runner.start());
      runnersStarted=true;
    }
    ensureHomeBubbleLayout();
    const bubbleRect=entryBubble.getBoundingClientRect();
    const phoneRect=phone.getBoundingClientRect();
    const x=bubbleRect.left-phoneRect.left+bubbleRect.width*.5;
    const y=bubbleRect.top-phoneRect.top+bubbleRect.height*.5;
    const radius=bubbleRect.width*.5;
    const cover=Math.hypot(
      Math.max(x,phoneRect.width-x),
      Math.max(y,phoneRect.height-y)
    );
    const token=++entryTransitionToken;

    phone.style.setProperty('--open-x',x.toFixed(2)+'px');
    phone.style.setProperty('--open-y',y.toFixed(2)+'px');
    phone.style.setProperty('--open-radius',radius.toFixed(2)+'px');
    phone.style.setProperty('--open-cover',cover.toFixed(2)+'px');
    phone.style.setProperty('--open-left',(x-radius).toFixed(2)+'px');
    phone.style.setProperty('--open-top',(y-radius).toFixed(2)+'px');
    phone.style.setProperty('--open-size',(radius*2).toFixed(2)+'px');
    phone.style.setProperty('--open-final-left',(phoneRect.width*.5-cover).toFixed(2)+'px');
    phone.style.setProperty('--open-final-top',(phoneRect.height*.5-cover).toFixed(2)+'px');
    phone.style.setProperty('--open-final-size',(cover*2).toFixed(2)+'px');
    openTransition.style.setProperty('--open-image','url("'+(golfPreviewActive ? golfPreviewImage.getAttribute('src') : sharedTravelBgImage)+'")');

    window.clearTimeout(stackEnterTimer);
    window.clearTimeout(stackCloseTimer);
    window.clearTimeout(homeEnterTimer);
    resetHomeInteractionState();
    phone.classList.remove('is-stack-entering','is-home-entering');
    phone.classList.add('is-stack-opening');
    window.setTimeout(()=>{
      if(token!==entryTransitionToken) return;
      phone.classList.add('is-stack-entering');
    },400);
    window.setTimeout(()=>{
      if(token!==entryTransitionToken) return;
      phone.classList.remove('is-stack-opening');
      phone.classList.add('is-stack');
      stackScreen.style.clipPath='none';
      stackScreen.style.webkitClipPath='none';
      stackEnterTimer=window.setTimeout(()=>{
        if(token!==entryTransitionToken) return;
        phone.classList.remove('is-stack-entering');
      },520);
    },1500);
  }

  function closeStackToHome(){
    if(!phone.classList.contains('is-stack') || phone.classList.contains('is-stack-closing')) return;
    clearScoreSequence();
    const token=++entryTransitionToken;
    window.clearTimeout(stackEnterTimer);
    window.clearTimeout(stackCloseTimer);
    window.clearTimeout(homeEnterTimer);
    resetHomeInteractionState();
    phone.classList.remove('is-stack-entering','is-home-entering');
    phone.classList.add('is-stack-closing');
    isDragging=false;
    if(activePointerId!==null && stack.hasPointerCapture(activePointerId)){
      stack.releasePointerCapture(activePointerId);
    }
    activePointerId=null;
    wheelProgress=0;
    window.clearTimeout(wheelLock);
    window.clearTimeout(wheelSettleTimer);
    stackCloseTimer=window.setTimeout(()=>{
      if(token!==entryTransitionToken) return;
      phone.classList.remove('is-stack','is-stack-closing');
      phone.classList.add('is-home-entering');
      stackScreen.style.removeProperty('clip-path');
      stackScreen.style.removeProperty('-webkit-clip-path');
      stackScreen.style.webkitClipPath='';
      resetHomeInteractionState();
      requestAnimationFrame(renderHomeBubbles);
      homeEnterTimer=window.setTimeout(()=>{
        if(token!==entryTransitionToken) return;
        phone.classList.remove('is-home-entering');
      },1280);
    },900);
  }

  function activeHeight(card){
    const value=parseFloat(card.style.getPropertyValue('--active-h'));

  function stateForSlot(slot,card){
    const activeH=activeHeight(card);
    const itemKey=card?.dataset.itemKey;
    const isHotel=itemKey==='transfer';

    }
    if(slot==='is-hidden-top'){
      return {w:20,h:20,x:0,y:-308,r:999,scale:1,opacity:0,blur:16,saturation:.78,bgOpacity:1,padTop:0,padX:0,padBottom:0,surfaceOpacity:0,surfaceBlur:12,thumbTop:24,thumbSize:64,thumbOpacity:0,chipTop:28,chipTranslateY:0,chipOpacity:0,labelOpacity:0};

  function mixState(from,to,t){
    return {
      w:lerp(from.w,to.w,t),
      h:lerp(from.h,to.h,t),
      x:lerp(from.x,to.x,t),
      y:lerp(from.y,to.y,t),
      r:lerp(from.r,to.r,t),
      scale:lerp(from.scale,to.scale,t),
      opacity:lerp(from.opacity,to.opacity,t),
      blur:lerp(from.blur,to.blur,t),
      saturation:lerp(from.saturation,to.saturation,t),
      bgOpacity:lerp(from.bgOpacity,to.bgOpacity,t),
      padTop:lerp(from.padTop,to.padTop,t),
      padX:lerp(from.padX,to.padX,t),
      padBottom:lerp(from.padBottom,to.padBottom,t),
      surfaceOpacity:lerp(from.surfaceOpacity,to.surfaceOpacity,t),
      surfaceBlur:lerp(from.surfaceBlur,to.surfaceBlur,t),
      thumbTop:lerp(from.thumbTop,to.thumbTop,t),
      thumbSize:lerp(from.thumbSize,to.thumbSize,t),
      thumbOpacity:lerp(from.thumbOpacity,to.thumbOpacity,t),
      chipTop:lerp(from.chipTop,to.chipTop,t),
      chipTranslateY:lerp(from.chipTranslateY,to.chipTranslateY,t),
      chipOpacity:lerp(from.chipOpacity,to.chipOpacity,t),
      labelOpacity:lerp(from.labelOpacity,to.labelOpacity,t)
    };
  }

  function slotForIndex(index,baseIndex){
    const forward=(index-baseIndex+items.length)%items.length;
    const backward=(baseIndex-index+items.length)%items.length;
    if(index===baseIndex) return 'is-active';
    if(backward===1) return 'is-prev';
    if(forward===1) return 'is-next';
    if(forward===2) return 'is-next2';
    return 'is-hidden';
  }

  function scrubStateForIndex(index,progress,card){
    if(Math.abs(progress)<.001){
      const slot=slotForIndex(index,activeIndex);
      return {
        slot,
        state:stateForSlot(slot,card),
        cropBubble:slot!=='is-active'
      };
    }

    const targetIndex=modIndex(activeIndex+Math.sign(progress));
    const fromSlot=slotForIndex(index,activeIndex);
    let toSlot=slotForIndex(index,targetIndex);
    const t=Math.abs(progress);

    if(progress>0 && index===modIndex(activeIndex-1)) toSlot='is-hidden-top';
    if(progress<0 && index===modIndex(activeIndex+2)) toSlot='is-hidden-bottom';

    const fromState=stateForSlot(fromSlot,card);
    const toState=stateForSlot(toSlot,card);
    const state=mixState(fromState,toState,t);
    let cropBubble=fromSlot!=='is-active' && toSlot!=='is-active';

    if(fromSlot==='is-active' && toSlot!=='is-active'){
      cropBubble=t>=.14;
      const cardFadeOut=1-easeUnit(t/.14);
      const bubbleFadeIn=easeUnit((t-.86)/.14);
      if(t<.14 || !toState.thumbOpacity){
        state.thumbTop=fromState.thumbTop;
        state.thumbSize=fromState.thumbSize;
        state.thumbOpacity=fromState.thumbOpacity*cardFadeOut;
      }else{
        state.thumbTop=toState.thumbTop;
        state.thumbSize=toState.thumbSize;
        state.thumbOpacity=toState.thumbOpacity*bubbleFadeIn;
      }
    }else if(toSlot==='is-active' && fromSlot!=='is-active'){
      cropBubble=t<.14;
      const bubbleFadeOut=1-easeUnit(t/.14);
      const cardFadeIn=easeUnit((t-.78)/.22);
      if(t<.14 && fromState.thumbOpacity){
        state.thumbTop=fromState.thumbTop;
        state.thumbSize=fromState.thumbSize;
        state.thumbOpacity=fromState.thumbOpacity*bubbleFadeOut;
      }else{
        state.thumbTop=toState.thumbTop;
        state.thumbSize=toState.thumbSize;
        state.thumbOpacity=toState.thumbOpacity*cardFadeIn;
      }
    }

    return {
      slot:fromSlot,
      state,
      cropBubble
    };
  }

  function deleteActiveCard(){
    if(items.length<=1) return exitDeleteMode();
    const index=activeIndex;
    const item=items[index];
    const card=cards[index];
    const runner=taskRunners.get(item.key);
    if(runner){
      runner.cancel();
      runner.subs=[];
    }
    if(activeDetailRunner===runner){
      closeDetailView();
    }
    if(card){
      card.classList.add('no-transition','is-delete-dragging');
      card.style.setProperty('--delete-shift','-220px');
      card.style.setProperty('--opacity','0');
      card.style.setProperty('--scale','.92');
    }
    exitDeleteMode(false);
    window.setTimeout(()=>{
      taskRunners.delete(item.key);
      cardRefsByKey.delete(item.key);
      items.splice(index,1);
      if(card){
        card.remove();
      }
      cards.splice(index,1);
      if(!items.length) return;
      activeIndex=Math.min(index,items.length-1);
      currentPillKey=items[activeIndex].key;
      render({keepBackground:true});
      commitStackBackground(activeIndex);
      measureActiveHeights();
      syncActiveCardHeightDeferred(activeIndex);
    },180);

  function measurePillWidth(text){

    probe.textContent=text;
    document.body.appendChild(probe);
    const width=Math.ceil(probe.getBoundingClientRect().width)+54;
    probe.remove();
    return width;
  }

  function setStackBackgroundImage(node,image){

  function syncStackBackground(index,progress=0){
    const current=items[modIndex(index)];
    const blend=Math.abs(progress);
    const primary=stackBgPrimary===0 ? stackBg : stackBgAlt;
    const secondary=stackBgPrimary===0 ? stackBgAlt : stackBg;
    setStackBackgroundImage(primary,current.image);
    if(blend<.001){
      primary.style.opacity='1';
      secondary.style.opacity='0';
      return;
    }
    const target=items[modIndex(index+Math.sign(progress))];
    if(current.image===target.image){
      primary.style.opacity='1';
      secondary.style.opacity='0';
      return;
    }
    setStackBackgroundImage(secondary,target.image);
    primary.style.opacity=(1-blend).toFixed(3);
    secondary.style.opacity=blend.toFixed(3);
  }

  function commitStackBackground(index){
    stackBgPrimary=1-stackBgPrimary;
    const primary=stackBgPrimary===0 ? stackBg : stackBgAlt;
    const secondary=stackBgPrimary===0 ? stackBgAlt : stackBg;
    setStackBackgroundImage(primary,items[modIndex(index)].image);
    primary.style.opacity='1';
    secondary.style.opacity='0';
  }

  function resetPuttingScoreBlock(){
    const block=getPuttingScoreBlock();
    if(!block) return;
    block.classList.remove('is-complete');
    const makes=block.querySelector('[data-score-makes]');
    const target=block.querySelector('[data-score-target]');
    const percent=block.querySelector('[data-score-percent]');
    const subtitle=block.querySelector('[data-score-subtitle]');
    const made=block.querySelector('[data-score-made]');
    const missed=block.querySelector('[data-score-missed]');
    const streak=block.querySelector('[data-score-streak]');
    const ring=block.querySelector('[data-score-progress]');
    if(makes) makes.textContent='0';
    if(target) target.textContent='/0';
    if(percent) percent.textContent='67';
    if(subtitle) subtitle.textContent='2 of 3 made';
    if(made) made.textContent='2';
    if(missed) missed.textContent='1';
    if(streak) streak.textContent='2';
    if(ring) ring.style.strokeDashoffset='326.73';
    setPuttingActionLabels('Pause','Finish');
    if(activeIndex===0){
      setPillStatus('ongoing');
      setDayPillWidth('Putting');
      dayPillText.textContent='Putting';

  function updatePuttingScoreState(makesValue,targetValue){

    const target=block.querySelector('[data-score-target]');

    scoreSequenceTimers.push(window.setTimeout(()=>updatePuttingScoreState(1,2),4000));

    const elapsed=now-golfPreviewStart;
    const progress=clamp(elapsed/12600,0,1)*.4;
    applyGolfPreviewTimeline(progress);
    if(progress<.4 && golfPreviewActive){
      golfPreviewRaf=requestAnimationFrame(animateGolfPreview);
      return;

    golfPreviewRaf=0;

  function updateDayPill(item,force=false){
    const runner=taskRunners.get(item.key);
    const statusName=runner ? runnerStatusToken(runner) : item.status;
    const pillText=getDayPillText(item);
    const isSame=item.key===currentPillKey && dayPillText.textContent===pillText && dayPill.dataset.status===statusName;
    if(!force && isSame) return;
    currentPillKey=item.key;
    dayPill.dataset.status=statusName;
    const token=++pillTransitionToken;
    setDayPillWidth(pillText);
    dayPillContent.classList.add('is-exiting');
    window.setTimeout(()=>{
      if(token!==pillTransitionToken) return;
      setPillStatus(statusName);
      dayPillText.textContent=pillText;
      dayPillContent.classList.remove('is-exiting');
      dayPillContent.classList.add('is-entering');
      requestAnimationFrame(()=>{
        if(token!==pillTransitionToken) return;
        dayPillContent.classList.remove('is-entering');
      });
    },180);
  }

  function render(options={}){
    if(!options.keepBackground) commitStackBackground(activeIndex);
    updateDayPill(items[activeIndex]);
    if(!scoreSequenceRunning) resetPuttingScoreBlock();
    const jumpCards=[];
    cards.forEach((card,index)=>{
      const forward=wrappedDistance(index);
      const backward=(activeIndex-index+items.length)%items.length;
      let slot='is-hidden';
      if(index===activeIndex) slot='is-active';
      else if(backward===1) slot='is-prev';
      else if(forward===1) slot='is-next';
      else if(forward===2) slot='is-next2';
      const previousSlot=card.dataset.slot || 'is-hidden';
      const shouldJump=
        (previousSlot==='is-prev' && (slot==='is-next2' || slot==='is-hidden')) ||
        ((previousSlot==='is-next2' || previousSlot==='is-hidden') && slot==='is-prev');
      card.dataset.slot=slot;
      card.className='bubble-card '+slot+(shouldJump ? ' no-transition' : '');
      if(!options.keepMotionState) clearMotionState(card);
      if(shouldJump) jumpCards.push(card);
    });
    if(jumpCards.length){
      requestAnimationFrame(()=>{
        jumpCards.forEach(card=>{
          card.classList.remove('no-transition');
        });
      });
    }
    mountDayPill(cards[activeIndex]);
    if(!scoreSequenceRunning && activeIndex===0){
      requestAnimationFrame(()=>{
        syncActiveCardHeight(0);
      });
    }
  }

  function renderScrub(progress){
    dragProgress=clamp(progress,-1,1);
    const previewIndex=modIndex(activeIndex+Math.round(dragProgress));
    syncStackBackground(activeIndex,dragProgress);
    updateDayPill(items[previewIndex]);
    let pillAnchorCard=null;
    let pillAnchorWidth=-1;
    cards.forEach((card,index)=>{
      const {slot,state,cropBubble}=scrubStateForIndex(index,dragProgress,card);
      card.dataset.slot=slot;
      card.className='bubble-card '+slot+' is-scrubbing'+(cropBubble ? ' is-cropping-bubble' : '');
      applyMotionState(card,state);
      if(state.w>pillAnchorWidth){
        pillAnchorWidth=state.w;
        pillAnchorCard=card;
      }
    });
    if(pillAnchorCard) mountDayPill(pillAnchorCard);
  }

  function settleScrub(direction){
    const wrappedIndex=direction>0
      ? modIndex(activeIndex-1)
      : direction<0
        ? modIndex(activeIndex+2)
        : null;
    activeIndex=modIndex(activeIndex+direction);
    render({keepMotionState:true,keepBackground:true});
    commitStackBackground(activeIndex);
    if(wrappedIndex!==null){
      const wrappedCard=cards[wrappedIndex];
      const finalSlot=wrappedCard.dataset.slot || 'is-hidden';
      const hiddenFinal=stateForSlot(finalSlot,wrappedCard);
      hiddenFinal.opacity=0;
      hiddenFinal.surfaceOpacity=0;
      wrappedCard.classList.add('no-transition');
      applyMotionState(wrappedCard,hiddenFinal);
    }
    requestAnimationFrame(()=>{
      cards.forEach(card=>card.classList.remove('no-transition'));
      cards.forEach(clearMotionState);
    });
    syncActiveCardHeightDeferred(activeIndex);
    dragProgress=0;
    wheelProgress=0;
  }

  function navigate(direction){
    clearScoreSequence();
    settleScrub(direction);
  }

  function onSwipeEnd(){
    if(Math.abs(touchDeltaY)<2){
      settleScrub(0);
      return;
    }
    const direction=Math.abs(dragProgress)>=settleThreshold ? Math.sign(dragProgress) : 0;
    settleScrub(direction);
  }

  homeScreen.addEventListener('pointerdown',event=>{
    if(phone.classList.contains('is-stack-opening') || phone.classList.contains('is-stack')) return;
    ensureHomeBubbleLayout();
    const p=homePoint(event);
    const bubble=event.target.closest('[data-home-bubble]');
    const bubbleIndex=bubble ? homeBubbles.indexOf(bubble) : -1;
    homeActivePointerId=event.pointerId;
    homeGestureStartX=p.x;
    homeGestureStartY=p.y;
    homeGestureMoved=false;
    homePanVelX=0;
    homePanVelY=0;
    homePanLastTime=performance.now();
    if(bubbleIndex>=0){
      const state=homeBubbleState.get(bubble);
      homeDragIndex=bubbleIndex;
      homePanning=false;
      homeOffX=p.x-(state.x+homePanOffsetX[bubbleIndex]);
      homeOffY=p.y-(state.y+homePanOffsetY[bubbleIndex]);
      homeDragTargetX=state.x;
      homeDragTargetY=state.y;
      bubble.classList.add('is-dragging');
    }else{
      homeDragIndex=-1;
      homePanning=true;
      homePanX=p.x;
      homePanY=p.y;
      setHomePanInfluence(p);
    }
    homeScreen.setPointerCapture(event.pointerId);
    event.preventDefault();
  });

  homeScreen.addEventListener('pointermove',event=>{
    if(homeActivePointerId!==event.pointerId) return;
    const p=homePoint(event);
    const totalDx=p.x-homeGestureStartX;
    const totalDy=p.y-homeGestureStartY;
    if(Math.hypot(totalDx,totalDy)>8) homeGestureMoved=true;
    if(homeDragIndex>=0){
      homeDragTargetX=p.x-homeOffX-homePanOffsetX[homeDragIndex];
      homeDragTargetY=p.y-homeOffY-homePanOffsetY[homeDragIndex];
      return;
    }
    if(!homePanning) return;
    const now=performance.now();
    const dt=Math.max(16,now-homePanLastTime);
    const rawDx=p.x-homePanX;
    const rawDy=p.y-homePanY;
    const speed=Math.hypot(rawDx,rawDy)/dt;
    const resistance=.18+Math.min(.34,speed*1.2);
    const dx=rawDx*resistance;
    const dy=rawDy*resistance;
    for(let i=0;i<homeBubbles.length;i++){
      homePanTargetX[i]+=dx*homePanInfluence[i];
      homePanTargetY[i]+=dy*homePanInfluence[i];
    }
    clampHomePanTargets();
    homePanVelX=homePanVelX*.5+(rawDx/dt)*520*.5;
    homePanVelY=homePanVelY*.5+(rawDy/dt)*520*.5;
    homePanX=p.x;
    homePanY=p.y;
    homePanLastTime=now;
  });

  function releaseHomePointer(event){
    if(homeActivePointerId!==event.pointerId) return;
    const draggedNode=homeDragIndex>=0 ? homeBubbles[homeDragIndex] : null;
    const shouldOpen=event.type==='pointerup' && draggedNode===entryBubble && !homeGestureMoved;
    if(homeDragIndex>=0){
      const state=homeBubbleState.get(draggedNode);
      if(state){
        state.x=homeDragTargetX;
        state.y=homeDragTargetY;
      }
      draggedNode.classList.remove('is-dragging');
    }
    if(homePanning){
      for(let i=0;i<homeBubbles.length;i++){
        homePanTargetX[i]+=homePanVelX*.48*homePanInfluence[i];
        homePanTargetY[i]+=homePanVelY*.48*homePanInfluence[i];
      }
      clampHomePanTargets();
    }
    homeDragIndex=-1;
    homePanning=false;
    homeActivePointerId=null;
    homePanVelX=0;
    homePanVelY=0;
    if(homeScreen.hasPointerCapture(event.pointerId)) homeScreen.releasePointerCapture(event.pointerId);
    if(shouldOpen) openStackFromHome();
  }

  homeScreen.addEventListener('pointerup',releaseHomePointer);
  homeScreen.addEventListener('pointercancel',releaseHomePointer);

  homeScreen.addEventListener('contextmenu',event=>{
    if(!phone.classList.contains('is-stack')) event.preventDefault();
  });

  backButton.addEventListener('pointerdown',event=>{
    event.stopPropagation();
  });

  backButton.addEventListener('click',event=>{
    event.stopPropagation();
    if(deleteMode){
      exitDeleteMode();
      return;
    }
    closeStackToHome();
  });

  detailBack.addEventListener('click',event=>{
    event.stopPropagation();
    closeDetailView();
  });

  stack.addEventListener('click',event=>{
    if(deleteMode){
      event.preventDefault();
      event.stopPropagation();
      exitDeleteMode();
      return;
    }
    const actionButton=event.target.closest('.action');
    if(!actionButton) return;
    event.stopPropagation();
    const card=actionButton.closest('.bubble-card');
    const item=items.find(entry=>entry.key===card?.dataset.itemKey);
    const runner=item ? taskRunners.get(item.key) : null;
    if(!item) return;
    if(actionButton.dataset.action==='detail'){
      openDetailView(item);
      return;
    }
    if(actionButton.dataset.action==='pause' && runner){
      runner.pause();
      return;
    }
    if(actionButton.dataset.action==='resume' && runner){
      runner.resume();
    }
  });

  stack.addEventListener('pointerdown',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(event.target.closest('.action')) return;
    if(activePointerId!==null) return;
    event.preventDefault();
    activePointerId=event.pointerId;
    stack.setPointerCapture(event.pointerId);
    touchStartX=event.clientX;
    touchStartY=event.clientY;
    touchDeltaY=0;
    longPressMoved=false;
    isDragging=false;
    stackGestureMode='pending';
    clearLongPressTimer();
    longPressTimer=window.setTimeout(()=>{
      if(activePointerId!==event.pointerId || stackGestureMode!=='pending') return;
      enterDeleteMode();
      stackGestureMode='delete';
    },longPressDelay);
  });

  stack.addEventListener('pointermove',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(event.pointerId!==activePointerId) return;
    event.preventDefault();
    const deltaX=event.clientX-touchStartX;
    touchDeltaY=event.clientY-touchStartY;
    if(stackGestureMode==='delete'){
      applyDeleteDrag(deltaX);
      return;
    }
    if(stackGestureMode==='pending'){
      if(Math.hypot(deltaX,touchDeltaY)>longPressMoveTolerance){
        longPressMoved=true;
        clearLongPressTimer();
      }
      if(Math.abs(touchDeltaY)>Math.abs(deltaX) && Math.abs(touchDeltaY)>6){
        stackGestureMode='scrub';
        isDragging=true;
      }else if(Math.abs(deltaX)>Math.abs(touchDeltaY) && Math.abs(deltaX)>longPressMoveTolerance){
        stackGestureMode='idle';
        return;
      }else{
        return;
      }
    }
    if(stackGestureMode!=='scrub' || !isDragging) return;
    renderScrub(-touchDeltaY/swipeDistance);
  });

  stack.addEventListener('pointerup',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(event.pointerId!==activePointerId) return;
    clearLongPressTimer();
    stack.releasePointerCapture(event.pointerId);
    if(stackGestureMode==='delete'){
      if(Math.abs(deleteDragX)>=deleteCommitDistance){
        deleteActiveCard();
      }else{
        exitDeleteMode();
      }
    }else if(stackGestureMode==='scrub' && isDragging){
      onSwipeEnd();
    }else if(deleteMode){
      exitDeleteMode();
    }
    isDragging=false;
    activePointerId=null;
    stackGestureMode='idle';
  });

  stack.addEventListener('pointercancel',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(event.pointerId!==activePointerId) return;
    clearLongPressTimer();
    stack.releasePointerCapture(event.pointerId);
    if(deleteMode){
      exitDeleteMode();
    }else if(stackGestureMode==='scrub' && isDragging){
      settleScrub(0);
    }
    isDragging=false;
    activePointerId=null;
    stackGestureMode='idle';
  });

  stack.addEventListener('wheel',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(deleteMode) return;
    event.preventDefault();
    if(Math.abs(event.deltaY)<16) return;
    window.clearTimeout(wheelLock);
    window.clearTimeout(wheelSettleTimer);
    wheelProgress=clamp(wheelProgress+event.deltaY/swipeDistance,-1,1);
    renderScrub(wheelProgress);
    wheelLock=window.setTimeout(()=>{
      wheelLock=null;
    },420);
    wheelSettleTimer=window.setTimeout(()=>{
      const direction=Math.abs(wheelProgress)>=settleThreshold ? Math.sign(wheelProgress) : 0;
      settleScrub(direction);
    },120);
  },{passive:false});

  window.addEventListener('keydown',event=>{
    if(phone.classList.contains('is-detail-view') && event.key==='Escape'){
      closeDetailView();
      return;
    }
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(deleteMode && event.key==='Escape'){
      exitDeleteMode();
      return;
    }
    if(deleteMode) return;
    if(event.key==='Escape') closeStackToHome();
    if(event.key==='ArrowUp') navigate(-1);
    if(event.key==='ArrowDown') navigate(1);
  });

  measureActiveHeights();
  setPillStatus(items[activeIndex].status);
  setDayPillWidth(getDayPillText(items[activeIndex]));
  dayPillText.textContent=getDayPillText(items[activeIndex]);
  commitStackBackground(activeIndex);
  window.addEventListener('resize',()=>{
    measureActiveHeights();
  });
  render();
  ensureHomeBubbleLayout();
  requestAnimationFrame(renderHomeBubbles);
  requestAnimationFrame(animateAuroraLoading);
  setGolfPreviewScene(previewScenes.putting);
  setGolfPreviewChip(previewScenes.putting);
  setGolfPreviewState(false);
  loadingOptionButtons.forEach(button=>{
    button.addEventListener('click',()=>setLoadingMotion(button.dataset.loadingOption));
  });
  setLoadingMotion(entryBubble.dataset.loadingMotion);
  entryBubble.addEventListener('keydown',event=>{
    if(event.key==='Enter' || event.key===' '){
      event.preventDefault();
      openStackFromHome();
    }
  });
})();
</script>
</body>
