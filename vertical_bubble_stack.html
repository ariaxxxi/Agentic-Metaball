<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vertical Bubble Stack</title>
<style>
:root{
  --phone-w:402px;
  --phone-h:874px;
  --ink:#fffdf7;
  --muted:rgba(255,255,255,.6);
  --glass:rgba(255,255,255,.18);
  --shadow:0 36px 90px rgba(59,53,38,.18);
  --ease:cubic-bezier(.22,.88,.24,1);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:#f0ede6;
  color:var(--ink);
  font-family:"Avenir Next","Helvetica Neue",ui-sans-serif,sans-serif;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
body{
  display:grid;
  place-items:center;
  overflow:hidden;
}
button{font:inherit;color:inherit}
button,
img,
svg,
.phone,
.stack-screen,
.bubble-card,
.prompt,
.day-pill{
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}
.prototype-shell{
  display:flex;
  align-items:center;
  gap:28px;
}
.phone{
  position:relative;
  width:min(var(--phone-w),100vw);
  height:min(var(--phone-h),100vh);
  aspect-ratio:402/874;
  overflow:hidden;
  isolation:isolate;
  touch-action:none;
  background:linear-gradient(180deg,#eeeeee 0%,#c1c1c1 100%);
  box-shadow:0 26px 80px rgba(0,0,0,.18);
}
.backdrop{
  position:absolute;
  inset:-18%;
  background:linear-gradient(180deg,#eeeeee 0%,#c1c1c1 100%);
  filter:blur(32px);
}
.grain{
  position:absolute;
  inset:0;
  opacity:.2;
  background-image:
    radial-gradient(rgba(255,255,255,.65) .45px,transparent .45px),
    radial-gradient(rgba(94,86,67,.18) .45px,transparent .45px);
  background-position:0 0,8px 8px;
  background-size:16px 16px;
  pointer-events:none;
  mix-blend-mode:soft-light;
}
.home-screen,
.stack-screen,
.open-transition{
  position:absolute;
  inset:0;
}
.home-screen{
  z-index:2;
  transition:opacity .42s ease,filter .62s ease;
  will-change:opacity,filter;
}
.stack-screen{
  z-index:3;
  opacity:0;
  pointer-events:none;
  clip-path:circle(var(--open-radius,0px) at var(--open-x,50%) var(--open-y,50%));
  -webkit-clip-path:circle(var(--open-radius,0px) at var(--open-x,50%) var(--open-y,50%));
  transition:
    opacity .18s linear,
    clip-path 1500ms var(--ease),
    -webkit-clip-path 1500ms var(--ease);
}
.stack-bg,
.stack-bg-alt{
  position:absolute;
  inset:-18%;
  z-index:0;
  pointer-events:none;
  background:
    linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.04) 28%,rgba(30,24,14,.1) 100%),
    var(--stack-bg-image,none) center/cover no-repeat;
  filter:blur(20px) saturate(1.04);
  transform:scale(1.16);
  opacity:0;
  transition:
    opacity 520ms var(--ease),
    filter 520ms var(--ease);
}
.stack-bg::after,
.stack-bg-alt::after{
  content:"";
  position:absolute;
  inset:-4%;
  background:linear-gradient(180deg,rgba(49,49,49,.18),rgba(24,24,24,.44) 100%);
}
.back-button,
.day-pill,
.stack,
.prompt{
  z-index:1;
}
.phone.is-stack-opening .stack-screen,
.phone.is-stack .stack-screen{
  opacity:1;
  pointer-events:auto;
}
.phone.is-stack-opening .stack-screen{
  clip-path:circle(var(--open-cover,120%) at var(--open-x,50%) var(--open-y,50%));
  -webkit-clip-path:circle(var(--open-cover,120%) at var(--open-x,50%) var(--open-y,50%));
}
.phone.is-stack .stack-screen{
  clip-path:none;
  -webkit-clip-path:none;
  transition:none;
}
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .back-button,
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .day-pill,
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .bubble-card,
.phone:not(.is-stack):not(.is-stack-entering) .stack-screen .prompt{
  opacity:0;
  animation:none;
}
.phone.is-stack .stack-screen .back-button,
.phone.is-stack .stack-screen .day-pill,
.phone.is-stack .stack-screen .prompt,
.phone.is-stack-entering .stack-screen .back-button,
.phone.is-stack-entering .stack-screen .day-pill,
.phone.is-stack-entering .stack-screen .prompt{
  opacity:1;
}
.phone.is-stack .stack-screen .bubble-card,
.phone.is-stack-entering .stack-screen .bubble-card{
  opacity:var(--opacity,1);
}
.phone.is-stack-entering .back-button{
  animation:stackBackEnter .56s var(--ease) both;
  animation-delay:0s;
}
.phone.is-stack-entering .day-pill{
  animation:stackPillEnter .72s var(--ease) both;
  animation-delay:0s;
}
.phone.is-stack-entering .bubble-card{
  animation:stackCardEnter .86s var(--ease) both;
}
.phone.is-stack-entering .bubble-card.is-prev{animation-delay:.04s}
.phone.is-stack-entering .bubble-card.is-active{animation-delay:.1s}
.phone.is-stack-entering .bubble-card.is-next{animation-delay:.22s}
.phone.is-stack-entering .bubble-card.is-next2{animation-delay:.34s}
.phone.is-stack-entering .bubble-card.is-hidden{animation-delay:.46s}
.phone.is-stack-entering .prompt{
  animation:stackPromptEnter .74s var(--ease) both;
  animation-delay:.54s;
}
.phone.is-stack-closing .stack-screen{
  pointer-events:none;
  animation:stackScreenExit .72s cubic-bezier(.22,.88,.24,1) forwards;
  transform-origin:50% 52%;
}
.phone.is-stack-opening .home-screen,
.phone.is-stack .home-screen{
  opacity:0;
  filter:blur(10px);
  pointer-events:none;
}
.phone.is-stack-closing .home-screen{
  opacity:1;
  filter:blur(0);
  pointer-events:none;
}
.phone.is-stack-opening .home-screen > :not(.golf-home){
  opacity:0;
  transition:opacity .32s ease;
}
.phone.is-stack-closing .home-bubble:not(.golf-home){
  opacity:0;
}
.phone.is-stack-closing .golf-home{
  opacity:1;
}
.phone.is-home-entering .home-bubble:not(.golf-home){
  animation:homeBubbleReturn .74s var(--ease) both;
  transform-origin:50% 50%;
}
.phone.is-home-entering .assistant-home{animation-delay:.02s}
.phone.is-home-entering .weather-home{animation-delay:.18s}
.phone.is-home-entering .grooming-home{animation-delay:.28s}
.phone.is-home-entering .cooking-home{animation-delay:.38s}
.phone.is-home-entering .golf-home{
  opacity:1;
  scale:1;
  filter:blur(0);
}
.back-button{
  position:absolute;
  left:22px;
  top:20px;
  width:48px;
  height:48px;
  border:0;
  border-radius:50%;
  color:#fff;
  background:rgba(0,0,0,.15);
  box-shadow:
    inset 0 0 10px rgba(255,255,255,.22),
    0 18px 36px rgba(0,0,0,.1);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  display:grid;
  place-items:center;
  z-index:6;
}
.back-button svg{
  width:23px;
  height:23px;
  stroke:currentColor;
  stroke-width:2.4;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.open-transition{
  z-index:5;
  display:none;
  border-radius:50%;
  background:
    linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.03) 38%,rgba(16,14,10,.18)),
    var(--open-image) center/cover no-repeat;
  box-shadow:0 26px 72px rgba(56,46,24,.26);
  left:var(--open-left,0px);
  top:var(--open-top,0px);
  width:var(--open-size,0px);
  height:var(--open-size,0px);
}
.phone.is-stack-opening .open-transition,
.phone.is-stack-closing .open-transition{
  display:block;
}
.phone.is-stack-opening .open-transition{
  animation:openBubbleExpand 1500ms var(--ease) forwards;
}
.phone.is-stack-closing .open-transition{
  z-index:2;
  animation:closeBubbleCollapse 900ms var(--ease) forwards;
}
.home-bubble{
  position:absolute;
  border:0;
  padding:0;
  margin:0;
  background:none;
  cursor:grab;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  will-change:transform,opacity;
}
.home-bubble.is-dragging{cursor:grabbing}
.home-bubble::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  box-shadow:0 28px 54px rgba(74,68,51,.18);
  opacity:.9;
}
.home-bubble img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  border-radius:inherit;
  pointer-events:none;
  user-select:none;
}
.assistant-home{
  left:20px;
  top:100px;
  width:180px;
  height:180px;
  animation-delay:-.7s;
}
.assistant-home::before{
  display:none;
}
.assistant-home img{
  object-fit:contain;
}
.cooking-home{
  left:268px;
  top:72px;
  width:170px;
  height:170px;
  border-radius:50%;
  overflow:hidden;
  animation-delay:-2.2s;
}
.golf-home{
  left:98px;
  top:258px;
  width:238px;
  height:238px;
  border-radius:50%;
  overflow:hidden;
  color:#fff;
  animation-delay:-1.1s;
  --golf-progress:0;
}
.golf-home::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:
    linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,0) 32%,rgba(53,60,26,.22) 100%);
  z-index:1;
  pointer-events:none;
}
.golf-ring{
  position:absolute;
  inset:-10px;
  border-radius:50%;
  background:
    conic-gradient(from 1turn,#D0FFC4 0turn calc(var(--golf-progress) * 1turn),transparent 0turn 1turn);
  filter:blur(6px);
  -webkit-mask:radial-gradient(
    closest-side,
    transparent calc(100% - 36px),
    rgba(0,0,0,.06) calc(100% - 32px),
    rgba(0,0,0,.16) calc(100% - 28px),
    rgba(0,0,0,.32) calc(100% - 24px),
    rgba(0,0,0,.54) calc(100% - 20px),
    rgba(0,0,0,.76) calc(100% - 16px),
    #000 calc(100% - 12px),
    #000 100%
  );
  mask:radial-gradient(
    closest-side,
    transparent calc(100% - 36px),
    rgba(0,0,0,.06) calc(100% - 32px),
    rgba(0,0,0,.16) calc(100% - 28px),
    rgba(0,0,0,.32) calc(100% - 24px),
    rgba(0,0,0,.54) calc(100% - 20px),
    rgba(0,0,0,.76) calc(100% - 16px),
    #000 calc(100% - 12px),
    #000 100%
  );
  z-index:2;
  pointer-events:none;
  transition:background 12600ms cubic-bezier(.22,.88,.24,1);
}
.golf-home-media{
  position:absolute;
  inset:0;
  z-index:0;
  transition:opacity 1200ms var(--ease),transform 1800ms var(--ease),filter 1800ms var(--ease);
}
.golf-home-media img{
  position:absolute;
  inset:0;
}
.golf-home-base{
  opacity:1;
  transform:scale(1);
  filter:blur(0);
}
.golf-home-active{
  opacity:0;
  transform:scale(1.08);
  filter:blur(10px);
}
.golf-home.is-preview-active .golf-home-base{
  opacity:0;
  transform:scale(1.08);
  filter:blur(8px);
}
.golf-home.is-preview-active .golf-home-active{
  opacity:1;
  transform:scale(1);
  filter:blur(0);
}
.golf-home .home-pill{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:3;
  gap:10px;
}
.golf-home .home-pill,
.golf-home .home-title{
  transition:opacity 900ms ease,transform 1600ms var(--ease),filter 1600ms var(--ease);
}
.golf-home .home-pill .pill-status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex:0 0 auto;
  background:var(--pill-dot,#ff9f2f);
  box-shadow:
    0 0 0 5px color-mix(in srgb,var(--pill-dot,#ff9f2f) 18%,transparent),
    0 0 18px color-mix(in srgb,var(--pill-dot,#ff9f2f) 44%,transparent);
  transition:background .42s var(--ease),box-shadow .42s var(--ease);
}
.golf-home .home-pill .pill-copy{
  white-space:nowrap;
}
.golf-home .home-pill.is-chip-transitioning{
  opacity:0;
  filter:blur(8px);
  transform:translateX(-50%) translateY(-8px) scale(.96);
}
.golf-home .home-title.is-label-transitioning{
  opacity:0;
  filter:blur(8px);
  transform:translateY(10px) scale(.96);
}
.golf-home .home-pill.is-alt,
.golf-home .home-title.is-alt{
  opacity:0;
  filter:blur(10px);
  transform:translateX(-50%) translateY(10px) scale(.96);
}
.golf-home .home-title.is-alt{
  transform:translateY(10px) scale(.96);
}
.golf-home.is-preview-active .home-pill.is-base,
.golf-home.is-preview-active .home-title.is-base{
  opacity:0;
  filter:blur(10px);
}
.golf-home.is-preview-active .home-pill.is-base{
  transform:translateX(-50%) translateY(-8px) scale(.96);
}
.golf-home.is-preview-active .home-title.is-base{
  transform:translateY(10px) scale(.96);
}
.golf-home.is-preview-active .home-pill.is-alt,
.golf-home.is-preview-active .home-title.is-alt{
  opacity:1;
  filter:blur(0);
}
.golf-home.is-preview-active .home-pill.is-alt{
  transform:translateX(-50%) translateY(0) scale(1);
}
.golf-home.is-preview-active .home-title.is-alt{
  transform:translateY(0) scale(1);
}
.golf-home.is-scene-transitioning .golf-home-active,
.golf-home.is-scene-transitioning .home-pill.is-alt,
.golf-home.is-scene-transitioning .home-title.is-alt{
  opacity:0;
  filter:blur(10px);
}
.golf-home.is-scene-transitioning .golf-home-active{
  transform:scale(1.08);
}
.golf-home.is-scene-transitioning .home-pill.is-alt{
  transform:translateX(-50%) translateY(-8px) scale(.96);
}
.golf-home.is-scene-transitioning .home-title.is-alt{
  transform:translateY(10px) scale(.96);
}
.golf-home .home-title{
  position:absolute;
  left:26px;
  right:26px;
  bottom:44px;
  z-index:3;
  text-align:center;
  font-size:23px;
  line-height:1.24;
  font-weight:500;
  text-shadow:0 10px 26px rgba(0,0,0,.2);
}
.grooming-home{
  left:-18px;
  top:528px;
  width:182px;
  height:182px;
  border-radius:50%;
  overflow:hidden;
  color:#fff;
  animation-delay:-3s;
}
.weather-home{
  left:263px;
  top:560px;
  width:126px;
  height:126px;
  border-radius:50%;
  overflow:hidden;
  animation-delay:-1.8s;
}
.weather-home img{
  object-fit:contain;
}
.home-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:0 20px;
  border-radius:999px;
  color:#fff;
  font-size:15px;
  font-weight:500;
  background:rgba(255,255,255,.08);
  box-shadow:0 22px 44px rgba(0,0,0,.18);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  isolation:isolate;
}
.home-pill::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  border:1px solid rgba(255,255,255,.18);
  pointer-events:none;
}
.cooking-home .home-pill,
.grooming-home .home-pill{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%);
}
.cooking-home .home-label,
.grooming-home .home-label{
  position:absolute;
  left:18px;
  right:18px;
  bottom:18px;
  z-index:2;
  text-align:center;
  font-size:18px;
  line-height:1.12;
  font-weight:500;
  text-shadow:0 8px 18px rgba(0,0,0,.22);
}
.grooming-home .home-label{
  bottom:22px;
  font-size:19px;
}
.spark-home{
  position:absolute;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  width:68px;
  height:68px;
  border:0;
  border-radius:50%;
  background:#000;
  box-shadow:
    inset 0 0 18px rgba(255,255,255,.3),
    0 18px 34px rgba(0,0,0,.1);
  -webkit-backdrop-filter:blur(18px);
  backdrop-filter:blur(18px);
  display:grid;
  place-items:center;
  z-index:6;
}
.spark-home::before{
  display:none;
}
.spark-home img{
  width:28px;
  height:28px;
}
.desktop-panel{
  width:228px;
  padding:20px;
  border-radius:28px;
  background:rgba(255,255,255,.06);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.1),
    0 28px 70px rgba(0,0,0,.24);
  -webkit-backdrop-filter:blur(24px);
  backdrop-filter:blur(24px);
  color:rgba(255,255,255,.9);
}
.desktop-panel h2{
  margin:0 0 6px;
  font-size:18px;
  line-height:1.2;
  font-weight:600;
}
.desktop-panel p{
  margin:0 0 18px;
  font-size:13px;
  line-height:1.45;
  color:rgba(255,255,255,.56);
}
.panel-actions{
  display:grid;
  gap:10px;
}
.panel-button{
  height:48px;
  border:0;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
  color:#fff;
  font-size:15px;
  font-weight:600;
}
.panel-button.is-primary{
  background:rgba(208,255,196,.18);
  box-shadow:
    inset 0 0 0 1px rgba(208,255,196,.28),
    inset 0 0 24px rgba(208,255,196,.12);
  color:#f3fff0;
}
@keyframes openBubbleExpand{
  from{
    left:var(--open-left,0px);
    top:var(--open-top,0px);
    width:var(--open-size,0px);
    height:var(--open-size,0px);
    opacity:1;
    filter:blur(0);
  }
  to{
    left:var(--open-final-left,0px);
    top:var(--open-final-top,0px);
    width:var(--open-final-size,0px);
    height:var(--open-final-size,0px);
    opacity:0;
    filter:blur(18px);
  }
}
@keyframes closeBubbleCollapse{
  from{
    left:var(--open-final-left,0px);
    top:var(--open-final-top,0px);
    width:var(--open-final-size,0px);
    height:var(--open-final-size,0px);
    opacity:.92;
    filter:blur(18px);
  }
  34%{
    opacity:1;
    filter:blur(8px);
  }
  to{
    left:var(--open-left,0px);
    top:var(--open-top,0px);
    width:var(--open-size,0px);
    height:var(--open-size,0px);
    opacity:1;
    filter:blur(0);
  }
}
.day-pill{
  position:absolute;
  top:-60px;
  left:50%;
  transform:translateX(-50%);
  width:var(--pill-w,118px);
  height:48px;
  padding:0 18px;
  border-radius:999px;
  color:#fff;
  font-size:18px;
  font-weight:500;
  letter-spacing:.02em;
  overflow:hidden;
  background:rgba(255,255,255,.05);
  box-shadow:
    inset 0 0 10px rgba(255,255,255,.25),
    0 22px 44px rgba(0,0,0,.12);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  isolation:isolate;
  z-index:4;
  transition:width .46s var(--ease);
}
.prompt::after,
.action::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  border-radius:inherit;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    inset 0 0 20px rgba(255,255,255,.14),
    inset 0 1px 8px rgba(255,255,255,.08),
    inset 0 -8px 14px rgba(255,255,255,.06);
  pointer-events:none;
}
.pill-content,
.prompt span,
.action-label{
  position:relative;
  z-index:2;
}
.pill-content{
  justify-content:center;
  white-space:nowrap;
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  height:100%;
  transition:opacity .28s ease,transform .34s var(--ease);
  will-change:opacity,transform;
}
.pill-dot{
  width:10px;
  height:10px;
  flex:0 0 auto;
  border-radius:50%;
  background:var(--status-color,#f59e0b);
  box-shadow:
    0 0 0 5px var(--status-halo,rgba(245,158,11,.16)),
    0 0 18px var(--status-glow,rgba(245,158,11,.42));
  transition:
    background .42s var(--ease),
    box-shadow .42s var(--ease),
    transform .34s var(--ease);
}

  function buildContent(node,data){
    const content=node.querySelector('.content');

    title.textContent=data.title;

    chip.querySelector('.chip-text').textContent=data.chip;
    label.innerHTML=data.bubbleLabel.replace(/\n/g,'<br>');

    content.innerHTML='';
    actions.innerHTML='';

    data.content.forEach(block=>{

      wrapper.className='content-block is-current';

          '<div class="score" aria-label="0 out of 0 makes"><strong data-score-makes>'+block.value+'</strong><span data-score-target>'+block.suffix+'</span></div>'+
          '<div class="score-note" data-score-note>'+block.note+'</div>'+
          '<div class="score-results" data-score-results>'+
            '<div class="score-results-ring" aria-hidden="true">'+
              '<svg viewBox="0 0 132 132">'+
                '<circle class="score-results-track" cx="66" cy="66" r="52"></circle>'+
                '<circle class="score-results-progress" data-score-progress cx="66" cy="66" r="52"></circle>'+
              '</svg>'+
              '<div class="score-results-value"><div class="score-results-percent-row"><strong data-score-percent>'+result.percent+'</strong><span>%</span></div><p class="score-results-subtitle" data-score-subtitle>'+result.made+' of '+(result.made+result.missed)+' made</p></div>'+
            '</div>'+
            '<p class="score-results-birdie" data-score-birdie>Birdie!</p>'+
            '<div class="score-results-stats">'+
              '<div><span class="score-results-stat-value" data-score-made>'+result.made+'</span><span class="score-results-stat-label">MADE</span></div>'+
              '<div><span class="score-results-stat-value" data-score-missed>'+result.missed+'</span><span class="score-results-stat-label">MISSED</span></div>'+
              '<div><span class="score-results-stat-value" data-score-streak>'+result.streak+'</span><span class="score-results-stat-label">STREAK</span></div>'+
            '</div>'+
          '</div>';
      }else if(block.type==='quote'){

      }else if(block.type==='proposal'){

    cards.push(card);

  function measureActiveHeights(){
    cards.forEach(card=>{
      const currentClass=card.className;
      card.className='bubble-card is-measuring';
      const height=Math.ceil(card.getBoundingClientRect().height);
      card.style.setProperty('--active-h',height+'px');
      card.className=currentClass;
    });
  }

  function modIndex(index){
    return (index+items.length)%items.length;
  }

  function clamp(value,min,max){
    return Math.max(min,Math.min(max,value));
  }

  function lerp(a,b,t){
    return a+(b-a)*t;
  }

  function ensureHomeBubbleLayout(){
    const phoneRect=phone.getBoundingClientRect();
    homeBubbles.forEach((node,index)=>{
      if(node.dataset.layoutReady==='true') return;
      const rect=node.getBoundingClientRect();
      const left=rect.left-phoneRect.left;
      const top=rect.top-phoneRect.top;
      node.style.left=left.toFixed(2)+'px';
      node.style.top=top.toFixed(2)+'px';
      node.style.width=rect.width.toFixed(2)+'px';
      node.style.height=rect.height.toFixed(2)+'px';
      node.style.right='auto';
      node.style.bottom='auto';
      node.dataset.layoutReady='true';
      homeBubbleState.set(node,{
        x:left,
        y:top,
        tx:left,
        ty:top,
        w:rect.width,
        h:rect.height,
        phase:index*1.17,
        speed:.82+(index%3)*.12
      });
    });
  }

  function homePoint(event){
    const rect=phone.getBoundingClientRect();
    return {
      x:(event.clientX-rect.left)*(phone.clientWidth/rect.width),
      y:(event.clientY-rect.top)*(phone.clientHeight/rect.height)
    };
  }

  function clampHomePanTargets(){
    const limitX=phone.clientWidth*.58;
    const limitY=phone.clientHeight*.58;
    for(let i=0;i<homeBubbles.length;i++){
      homePanTargetX[i]=clamp(homePanTargetX[i],-limitX,limitX);
      homePanTargetY[i]=clamp(homePanTargetY[i],-limitY,limitY);
    }
  }

  function setHomePanInfluence(origin){
    const maxDistance=Math.hypot(phone.clientWidth,phone.clientHeight)*.58;
    homeBubbles.forEach((node,index)=>{
      const state=homeBubbleState.get(node);
      if(!state){
        homePanInfluence[index]=1;
        return;
      }
      const centerX=state.x+state.w*.5+homePanOffsetX[index];
      const centerY=state.y+state.h*.5+homePanOffsetY[index];
      const radius=Math.min(state.w,state.h)*.5;
      const distance=Math.max(0,Math.hypot(origin.x-centerX,origin.y-centerY)-radius*.45);
      const t=clamp(distance/maxDistance,0,1);
      const eased=t*t*(3-2*t);
      homePanInfluence[index]=1-eased*.64;
    });
  }

  function renderHomeBubbles(now){
    if(phone.classList.contains('is-stack')) return;
    const t=now*.001;
    homeBubbles.forEach((node,index)=>{
      const state=homeBubbleState.get(node);
      if(!state) return;
      homePanOffsetX[index] += (homePanTargetX[index]-homePanOffsetX[index])*.105;
      homePanOffsetY[index] += (homePanTargetY[index]-homePanOffsetY[index])*.105;
      if(index===homeDragIndex){
        state.x += (homeDragTargetX-state.x)*.34;
        state.y += (homeDragTargetY-state.y)*.34;
      }
      const floatX=Math.sin(t*state.speed+state.phase)*2.6;
      const floatY=Math.cos(t*(state.speed*.88)+state.phase)*7.2;
      const dx=homePanOffsetX[index]+floatX;
      const dy=homePanOffsetY[index]+floatY;
      node.style.transform='translate3d('+dx.toFixed(2)+'px,'+dy.toFixed(2)+'px,0)';
      node.style.left=state.x.toFixed(2)+'px';
      node.style.top=state.y.toFixed(2)+'px';
    });
    requestAnimationFrame(renderHomeBubbles);
  }

  function resetHomeInteractionState(){
    if(homeActivePointerId!==null && homeScreen.hasPointerCapture(homeActivePointerId)){
      homeScreen.releasePointerCapture(homeActivePointerId);
    }
    homeBubbles.forEach(node=>node.classList.remove('is-dragging'));
    homeDragIndex=-1;
    homePanning=false;
    homeActivePointerId=null;
    homePanVelX=0;
    homePanVelY=0;
    homeGestureMoved=false;
  }

  function openStackFromHome(){
    if(phone.classList.contains('is-stack-opening') || phone.classList.contains('is-stack') || phone.classList.contains('is-stack-closing')) return;
    ensureHomeBubbleLayout();
    const bubbleRect=entryBubble.getBoundingClientRect();
    const phoneRect=phone.getBoundingClientRect();
    const x=bubbleRect.left-phoneRect.left+bubbleRect.width*.5;
    const y=bubbleRect.top-phoneRect.top+bubbleRect.height*.5;
    const radius=bubbleRect.width*.5;
    const cover=Math.hypot(
      Math.max(x,phoneRect.width-x),
      Math.max(y,phoneRect.height-y)
    );
    const token=++entryTransitionToken;

    phone.style.setProperty('--open-x',x.toFixed(2)+'px');
    phone.style.setProperty('--open-y',y.toFixed(2)+'px');
    phone.style.setProperty('--open-radius',radius.toFixed(2)+'px');
    phone.style.setProperty('--open-cover',cover.toFixed(2)+'px');
    phone.style.setProperty('--open-left',(x-radius).toFixed(2)+'px');
    phone.style.setProperty('--open-top',(y-radius).toFixed(2)+'px');
    phone.style.setProperty('--open-size',(radius*2).toFixed(2)+'px');
    phone.style.setProperty('--open-final-left',(phoneRect.width*.5-cover).toFixed(2)+'px');
    phone.style.setProperty('--open-final-top',(phoneRect.height*.5-cover).toFixed(2)+'px');
    phone.style.setProperty('--open-final-size',(cover*2).toFixed(2)+'px');
    openTransition.style.setProperty('--open-image','url("'+(golfPreviewActive ? golfPreviewImage.getAttribute('src') : 'final-bubbles/image 62850.png')+'")');

    window.clearTimeout(stackEnterTimer);
    window.clearTimeout(stackCloseTimer);
    window.clearTimeout(homeEnterTimer);
    resetHomeInteractionState();
    phone.classList.remove('is-stack-entering','is-home-entering');
    phone.classList.add('is-stack-opening');
    window.setTimeout(()=>{
      if(token!==entryTransitionToken) return;
      phone.classList.add('is-stack-entering');
    },400);
    window.setTimeout(()=>{
      if(token!==entryTransitionToken) return;
      phone.classList.remove('is-stack-opening');
      phone.classList.add('is-stack');
      stackScreen.style.clipPath='none';
      stackScreen.style.webkitClipPath='none';
      stackEnterTimer=window.setTimeout(()=>{
        if(token!==entryTransitionToken) return;
        phone.classList.remove('is-stack-entering');
      },520);
    },1500);
  }

  function closeStackToHome(){
    if(!phone.classList.contains('is-stack') || phone.classList.contains('is-stack-closing')) return;
    clearScoreSequence();
    const token=++entryTransitionToken;
    window.clearTimeout(stackEnterTimer);
    window.clearTimeout(stackCloseTimer);
    window.clearTimeout(homeEnterTimer);
    resetHomeInteractionState();
    phone.classList.remove('is-stack-entering','is-home-entering');
    phone.classList.add('is-stack-closing');
    isDragging=false;
    if(activePointerId!==null && stack.hasPointerCapture(activePointerId)){
      stack.releasePointerCapture(activePointerId);
    }
    activePointerId=null;
    wheelProgress=0;
    window.clearTimeout(wheelLock);
    window.clearTimeout(wheelSettleTimer);
    stackCloseTimer=window.setTimeout(()=>{
      if(token!==entryTransitionToken) return;
      phone.classList.remove('is-stack','is-stack-closing');
      phone.classList.add('is-home-entering');
      stackScreen.style.removeProperty('clip-path');
      stackScreen.style.removeProperty('-webkit-clip-path');
      stackScreen.style.webkitClipPath='';
      resetHomeInteractionState();
      requestAnimationFrame(renderHomeBubbles);
      homeEnterTimer=window.setTimeout(()=>{
        if(token!==entryTransitionToken) return;
        phone.classList.remove('is-home-entering');
      },1280);
    },900);
  }

  function activeHeight(card){
    const value=parseFloat(card.style.getPropertyValue('--active-h'));
    return Number.isFinite(value) ? value : 420;

  function stateForSlot(slot,card){
    const activeH=activeHeight(card);
    if(slot==='is-prev'){
      return {w:20,h:20,x:0,y:-308,r:999,scale:1,opacity:1,blur:4,saturation:.84,bgOpacity:1,padTop:0,padX:0,padBottom:0,surfaceOpacity:1,surfaceBlur:0,thumbTop:24,thumbSize:64,thumbOpacity:0,chipTop:28,chipTranslateY:0,chipOpacity:0,labelOpacity:1};
    }
    if(slot==='is-active'){
      return {w:348,h:activeH,x:0,y:0,r:70,scale:1,opacity:1,blur:0,saturation:1,bgOpacity:1,padTop:110,padX:28,padBottom:26,surfaceOpacity:0,surfaceBlur:14,thumbTop:24,thumbSize:64,thumbOpacity:1,chipTop:28,chipTranslateY:0,chipOpacity:0,labelOpacity:0};
    }
    if(slot==='is-next'){
      return {w:160,h:160,x:0,y:248,r:999,scale:1,opacity:1,blur:0,saturation:1,bgOpacity:1,padTop:0,padX:0,padBottom:0,surfaceOpacity:0,surfaceBlur:0,thumbTop:0,thumbSize:160,thumbOpacity:1,chipTop:28,chipTranslateY:0,chipOpacity:1,labelOpacity:1};
    }
    if(slot==='is-next2'){
      return {w:78.4,h:78.4,x:0,y:380,r:999,scale:1,opacity:1,blur:12,saturation:.8,bgOpacity:1,padTop:0,padX:0,padBottom:0,surfaceOpacity:1,surfaceBlur:0,thumbTop:0,thumbSize:78.4,thumbOpacity:0,chipTop:28,chipTranslateY:0,chipOpacity:0,labelOpacity:1};
    }
    if(slot==='is-hidden-top'){
      return {w:20,h:20,x:0,y:-308,r:999,scale:1,opacity:0,blur:16,saturation:.78,bgOpacity:1,padTop:0,padX:0,padBottom:0,surfaceOpacity:0,surfaceBlur:12,thumbTop:24,thumbSize:64,thumbOpacity:0,chipTop:28,chipTranslateY:0,chipOpacity:0,labelOpacity:0};
    }
    if(slot==='is-hidden-bottom'){
      return {w:78.4,h:78.4,x:0,y:380,r:999,scale:1,opacity:0,blur:16,saturation:.78,bgOpacity:1,padTop:0,padX:0,padBottom:0,surfaceOpacity:0,surfaceBlur:12,thumbTop:0,thumbSize:78.4,thumbOpacity:0,chipTop:28,chipTranslateY:0,chipOpacity:0,labelOpacity:0};
    }
    return {w:84,h:84,x:0,y:600,r:999,scale:.9,opacity:.28,blur:16,saturation:.78,bgOpacity:1,padTop:0,padX:0,padBottom:0,surfaceOpacity:.42,surfaceBlur:8,thumbTop:0,thumbSize:84,thumbOpacity:0,chipTop:28,chipTranslateY:0,chipOpacity:0,labelOpacity:.42};
  }

  function mixState(from,to,t){
    return {
      w:lerp(from.w,to.w,t),
      h:lerp(from.h,to.h,t),
      x:lerp(from.x,to.x,t),
      y:lerp(from.y,to.y,t),
      r:lerp(from.r,to.r,t),
      scale:lerp(from.scale,to.scale,t),
      opacity:lerp(from.opacity,to.opacity,t),
      blur:lerp(from.blur,to.blur,t),
      saturation:lerp(from.saturation,to.saturation,t),
      bgOpacity:lerp(from.bgOpacity,to.bgOpacity,t),
      padTop:lerp(from.padTop,to.padTop,t),
      padX:lerp(from.padX,to.padX,t),
      padBottom:lerp(from.padBottom,to.padBottom,t),
      surfaceOpacity:lerp(from.surfaceOpacity,to.surfaceOpacity,t),
      surfaceBlur:lerp(from.surfaceBlur,to.surfaceBlur,t),
      thumbTop:lerp(from.thumbTop,to.thumbTop,t),
      thumbSize:lerp(from.thumbSize,to.thumbSize,t),
      thumbOpacity:lerp(from.thumbOpacity,to.thumbOpacity,t),
      chipTop:lerp(from.chipTop,to.chipTop,t),
      chipTranslateY:lerp(from.chipTranslateY,to.chipTranslateY,t),
      chipOpacity:lerp(from.chipOpacity,to.chipOpacity,t),
      labelOpacity:lerp(from.labelOpacity,to.labelOpacity,t)
    };
  }

  function slotForIndex(index,baseIndex){
    const forward=(index-baseIndex+items.length)%items.length;
    const backward=(baseIndex-index+items.length)%items.length;
    if(index===baseIndex) return 'is-active';
    if(backward===1) return 'is-prev';
    if(forward===1) return 'is-next';
    if(forward===2) return 'is-next2';
    return 'is-hidden';
  }

  function scrubStateForIndex(index,progress,card){
    if(Math.abs(progress)<.001){
      const slot=slotForIndex(index,activeIndex);
      return {slot,state:stateForSlot(slot,card)};
    }

    const targetIndex=modIndex(activeIndex+Math.sign(progress));
    const fromSlot=slotForIndex(index,activeIndex);
    let toSlot=slotForIndex(index,targetIndex);
    const t=Math.abs(progress);

    if(progress>0 && index===modIndex(activeIndex-1)) toSlot='is-hidden-top';
    if(progress<0 && index===modIndex(activeIndex+2)) toSlot='is-hidden-bottom';

    return {
      slot:t>=.5 ? toSlot : fromSlot,
      state:mixState(stateForSlot(fromSlot,card),stateForSlot(toSlot,card),t)
    };
  }

  function applyMotionState(card,state){
    card.style.setProperty('--w',state.w.toFixed(2)+'px');
    card.style.setProperty('--h',state.h.toFixed(2)+'px');
    card.style.setProperty('--x',state.x.toFixed(2)+'px');
    card.style.setProperty('--y',state.y.toFixed(2)+'px');
    card.style.setProperty('--r',state.r.toFixed(2)+'px');
    card.style.setProperty('--scale',state.scale.toFixed(3));
    card.style.setProperty('--opacity',state.opacity.toFixed(3));
    card.style.setProperty('--blur',state.blur.toFixed(2)+'px');
    card.style.setProperty('--saturation',state.saturation.toFixed(3));
    card.style.setProperty('--bg-opacity',state.bgOpacity.toFixed(3));
    card.style.setProperty('--pad-top',state.padTop.toFixed(2)+'px');
    card.style.setProperty('--pad-x',state.padX.toFixed(2)+'px');
    card.style.setProperty('--pad-bottom',state.padBottom.toFixed(2)+'px');

    const surface=card.querySelector('.bubble-surface');
    surface.style.opacity=state.surfaceOpacity.toFixed(3);
    surface.style.setProperty('--surface-blur',state.surfaceBlur.toFixed(2)+'px');

    const thumb=card.querySelector('.bubble-thumb');
    thumb.style.top=state.thumbTop.toFixed(2)+'px';
    thumb.style.width=state.thumbSize.toFixed(2)+'px';
    thumb.style.height=state.thumbSize.toFixed(2)+'px';
    thumb.style.opacity=state.thumbOpacity.toFixed(3);

    const chip=card.querySelector('.compact-chip');
    chip.style.top=state.chipTop.toFixed(2)+'px';
    chip.style.transform='translate(-50%,'+state.chipTranslateY.toFixed(2)+'%)';
    chip.style.opacity=state.chipOpacity.toFixed(3);
    card.querySelector('.bubble-label').style.opacity=state.labelOpacity.toFixed(3);
  }

  function clearMotionState(card){
    motionVars.forEach(name=>card.style.removeProperty(name));
    card.style.removeProperty('--delete-shift');
    card.classList.remove('is-delete-dragging');
    const surface=card.querySelector('.bubble-surface');
    surface.style.removeProperty('opacity');
    surface.style.removeProperty('--surface-blur');
    const thumb=card.querySelector('.bubble-thumb');
    thumb.style.removeProperty('top');
    thumb.style.removeProperty('width');
    thumb.style.removeProperty('height');
    thumb.style.removeProperty('opacity');
    const chip=card.querySelector('.compact-chip');
    chip.style.removeProperty('top');
    chip.style.removeProperty('transform');
    chip.style.removeProperty('opacity');
    card.querySelector('.bubble-label').style.removeProperty('opacity');
  }

  function clearLongPressTimer(){
    window.clearTimeout(longPressTimer);
    longPressTimer=0;
  }

  function activeCard(){
    return cards[activeIndex] || null;
  }

  function currentCardState(card){
    const cardRect=card.getBoundingClientRect();
    const stackRect=stack.getBoundingClientRect();
    const computed=getComputedStyle(card);
    const slot=card.dataset.slot || '';
    const fallback=stateForSlot(slot,card);
    return Object.assign({},fallback,{
      w:cardRect.width,
      h:cardRect.height,
      x:cardRect.left+cardRect.width*.5-stackRect.left-stackRect.width*.5,
      y:cardRect.top+cardRect.height*.5-stackRect.top-stackRect.height*.5,
      r:parseFloat(computed.borderTopLeftRadius) || fallback.r,
      opacity:parseFloat(computed.opacity) || fallback.opacity,
      blur:fallback.blur,
      saturation:fallback.saturation
    });
  }

  function updateDeleteProgress(offsetX){
    const leftDrag=Math.max(0,-offsetX);
    const progress=clamp(leftDrag/deleteRevealDistance,0,1);
    stackScreen.style.setProperty('--delete-progress',progress.toFixed(3));
    deleteAffordance.dataset.armed=leftDrag>=deleteCommitDistance ? 'true' : 'false';
  }

  function enterDeleteMode(){
    if(deleteMode || !activeCard()) return;
    deleteMode=true;
    deleteDragX=0;
    mountDeleteAffordance(activeCard());
    phone.classList.add('is-delete-mode');
    updateDeleteProgress(0);
  }

  function applyDeleteDrag(offsetX){
    const card=activeCard();
    if(!card) return;
    deleteDragX=Math.min(0,offsetX);
    card.classList.add('is-delete-dragging');
    card.style.setProperty('--delete-shift',deleteDragX.toFixed(2)+'px');
    updateDeleteProgress(deleteDragX);
  }

  function exitDeleteMode(resetCard=true){
    const card=activeCard();
    deleteMode=false;
    deleteDragX=0;
    phone.classList.remove('is-delete-mode');
    deleteAffordance.dataset.armed='false';
    stackScreen.style.setProperty('--delete-progress','0');
    if(card){
      card.classList.remove('is-delete-dragging');
      if(resetCard) card.style.removeProperty('--delete-shift');
    }
  }

  function resetDeleteDrag(){
    const card=activeCard();
    deleteDragX=0;
    deleteAffordance.dataset.armed='false';
    stackScreen.style.setProperty('--delete-progress','0');
    if(card){
      card.classList.remove('is-delete-dragging');
      card.style.removeProperty('--delete-shift');
    }
  }

  function deleteActiveCard(){
    if(items.length<=1){
      exitDeleteMode();
      return;
    }
    const index=activeIndex;
    const card=cards[index];
    const survivorStarts=new Map();
    cards.forEach(existingCard=>{
      if(existingCard!==card) survivorStarts.set(existingCard,currentCardState(existingCard));
    });
    if(card){
      card.classList.add('no-transition','is-delete-dragging');
      card.style.setProperty('--delete-shift','-220px');
      card.style.setProperty('--opacity','0');
      card.style.setProperty('--scale','.92');
    }
    exitDeleteMode(false);
    window.setTimeout(()=>{
      items.splice(index,1);
      if(card) card.remove();
      cards.splice(index,1);
      activeIndex=Math.min(index,items.length-1);
      currentPillKey='';
      render({keepMotionState:true,keepBackground:true});
      commitStackBackground(activeIndex);
      measureActiveHeights();
      if(survivorStarts.size){
        survivorStarts.forEach((startState,survivorCard)=>{
          if(!cards.includes(survivorCard)) return;
          survivorCard.classList.add('no-transition');
          applyMotionState(survivorCard,startState);
        });
        void stack.offsetWidth;
        requestAnimationFrame(()=>{
          survivorStarts.forEach((_,survivorCard)=>{
            if(!cards.includes(survivorCard)) return;
            survivorCard.classList.remove('no-transition');
            clearMotionState(survivorCard);
          });
        });
      }
    },180);
  }

  function wrappedDistance(index){
    return (index-activeIndex+items.length)%items.length;
  }

  function setPillStatus(statusName){
    const status=statusTokens[statusName] || statusTokens.ongoing;
    dayPill.style.setProperty('--status-color',status.color);
    dayPill.style.setProperty('--status-bg',status.bg);
    dayPill.style.setProperty('--status-halo',status.halo);
    dayPill.style.setProperty('--status-glow',status.glow);

  function measurePillWidth(text){
    const probe=document.createElement('span');
    probe.style.cssText='position:absolute;left:-9999px;top:0;font:600 20px "Avenir Next","Helvetica Neue",ui-sans-serif,sans-serif;letter-spacing:.02em;white-space:nowrap;';
    probe.textContent=text;
    document.body.appendChild(probe);
    const width=Math.ceil(probe.getBoundingClientRect().width)+70;
    probe.remove();
    return width;
  }

  function setDayPillWidth(text){
    dayPill.style.setProperty('--pill-w',measurePillWidth(text)+'px');

  function setStackBackgroundImage(node,image){
    node.style.setProperty('--stack-bg-image','url("'+image+'")');
  }

  function syncStackBackground(index,progress=0){
    const current=items[modIndex(index)];
    const blend=Math.abs(progress);
    const primary=stackBgPrimary===0 ? stackBg : stackBgAlt;
    const secondary=stackBgPrimary===0 ? stackBgAlt : stackBg;
    setStackBackgroundImage(primary,current.image);
    if(blend<.001){
      primary.style.opacity='1';
      secondary.style.opacity='0';
      return;
    }
    const target=items[modIndex(index+Math.sign(progress))];
    setStackBackgroundImage(secondary,target.image);
    primary.style.opacity=(1-blend).toFixed(3);
    secondary.style.opacity=blend.toFixed(3);
  }

  function commitStackBackground(index){
    stackBgPrimary=1-stackBgPrimary;
    const primary=stackBgPrimary===0 ? stackBg : stackBgAlt;
    const secondary=stackBgPrimary===0 ? stackBgAlt : stackBg;
    setStackBackgroundImage(primary,items[modIndex(index)].image);
    primary.style.opacity='1';
    secondary.style.opacity='0';
  }

  function clearScoreSequence(){
    scoreSequenceTimers.forEach(id=>window.clearTimeout(id));
    scoreSequenceTimers=[];
    scoreSequenceRunning=false;
  }

  function computeActiveCardHeight(card){
    if(!card) return 420;
    const meta=card.querySelector('.meta');
    const content=card.querySelector('.content');
    const actions=card.querySelector('.actions');
    const padTop=110;
    const padBottom=26;
    const metaHeight=meta ? Math.ceil(meta.getBoundingClientRect().height) : 0;
    const contentHeight=content ? Math.ceil(content.scrollHeight) : 0;
    const actionsHeight=actions ? Math.ceil(actions.getBoundingClientRect().height) : 0;
    return padTop + metaHeight + 20 + contentHeight + 20 + actionsHeight + padBottom;
  }

  function syncActiveCardHeight(index){
    const card=cards[index];
    if(!card) return;
    const height=computeActiveCardHeight(card);
    card.style.setProperty('--active-h',height+'px');
    if(index===activeIndex){
      card.style.setProperty('--h',height+'px');
    }
  }

  function mountDayPill(card){
    const host=card || stackScreen;
    if(dayPill.parentNode!==host){
      host.appendChild(dayPill);
    }
  }

  function mountDeleteAffordance(card){
    const host=card || stackScreen;
    if(deleteAffordance.parentNode!==host){

  function getPuttingScoreBlock(){

  function setPuttingActionLabels(primary,secondary){

    const labels=card.querySelectorAll('.action-label');
    if(labels[0]) labels[0].textContent=primary;
    if(labels[1]) labels[1].textContent=secondary;

  function setPuttingActionMode(single){
    const card=cards[0];
    if(!card) return;
    const actions=card.querySelector('.actions');
    const buttons=card.querySelectorAll('.action');
    if(actions) actions.classList.toggle('is-single',single);

  function resetPuttingScoreBlock(){
    const block=getPuttingScoreBlock();
    if(!block) return;
    block.classList.remove('is-complete');
    const makes=block.querySelector('[data-score-makes]');
    const target=block.querySelector('[data-score-target]');
    const percent=block.querySelector('[data-score-percent]');
    const subtitle=block.querySelector('[data-score-subtitle]');
    const made=block.querySelector('[data-score-made]');
    const missed=block.querySelector('[data-score-missed]');
    const streak=block.querySelector('[data-score-streak]');
    const ring=block.querySelector('[data-score-progress]');
    if(makes) makes.textContent='0';
    if(target) target.textContent='/3';
    if(percent) percent.textContent='67';
    if(subtitle) subtitle.textContent='2 of 3 made';
    if(made) made.textContent='2';
    if(missed) missed.textContent='1';
    if(streak) streak.textContent='2';
    if(ring) ring.style.strokeDashoffset='326.73';
    setPuttingActionLabels('Pause','Finish');
    setPuttingActionMode(false);
    if(activeIndex===0){
      setPillStatus('ongoing');
      setDayPillWidth('Putting');
      dayPillText.textContent='Putting';
    }

  function updatePuttingScoreState(makesValue,targetValue){
    const block=getPuttingScoreBlock();
    if(!block) return;
    const makes=block.querySelector('[data-score-makes]');
    const target=block.querySelector('[data-score-target]');
    const score=block.querySelector('.score');
    const note=block.querySelector('[data-score-note]');
    if(makes) makes.textContent=String(makesValue);
    if(target) target.textContent='/'+String(targetValue);
    if(score) score.setAttribute('aria-label',makesValue+' out of '+targetValue+' makes');
    if(note) note.textContent='makes';
  }

  function revealPuttingResults(){
    const block=getPuttingScoreBlock();
    if(!block) return;
    block.classList.add('is-complete');
    setPuttingActionLabels('Share','');
    setPuttingActionMode(true);
    if(activeIndex===0){
      setPillStatus('completed');
      setDayPillWidth('Finished');
      dayPillText.textContent='Finished';
    }
    syncActiveCardHeight(0);
  }

  function startPuttingCardSequence(){
    if(!phone.classList.contains('is-stack')) return;
    clearScoreSequence();
    if(activeIndex!==0){
      activeIndex=0;
      render();
    }
    resetPuttingScoreBlock();
    syncActiveCardHeight(0);
    scoreSequenceRunning=true;
    updatePuttingScoreState(0,3);
    scoreSequenceTimers.push(window.setTimeout(()=>updatePuttingScoreState(1,3),2000));
    scoreSequenceTimers.push(window.setTimeout(()=>updatePuttingScoreState(2,3),4000));
    scoreSequenceTimers.push(window.setTimeout(()=>updatePuttingScoreState(2,3),6000));
    scoreSequenceTimers.push(window.setTimeout(()=>revealPuttingResults(),8000));
    scoreSequenceTimers.push(window.setTimeout(()=>{
      navigate(1);
      scoreSequenceTimers=[];
      scoreSequenceRunning=false;
    },10600));
  }

  function applyGolfPreviewTimeline(progress){
    golfPreviewProgress=clamp(progress,0,.4);
    entryBubble.style.setProperty('--golf-progress',golfPreviewProgress.toFixed(3));
    if(golfPreviewProgress<.2){
      transitionGolfPreviewScene('putting');
      transitionGolfPreviewChip('putting');
      transitionGolfPreviewLabel('putting');
    }else{
      transitionGolfPreviewScene('compose');
      transitionGolfPreviewChip(golfPreviewProgress<.3 ? 'compose' : 'ready');
      transitionGolfPreviewLabel(golfPreviewProgress<.3 ? 'compose' : 'ready');
    }
  }

  function stopGolfPreviewAnimation(reset=false){
    if(golfPreviewRaf){
      cancelAnimationFrame(golfPreviewRaf);
      golfPreviewRaf=0;
    }
    if(reset){
      clearTimeout(golfPreviewSceneTimer);
      clearTimeout(golfPreviewChipTimer);
      clearTimeout(golfPreviewLabelTimer);
      golfPreviewStart=0;
      golfPreviewProgress=0;
      golfPreviewSceneKey='putting';
      golfPreviewChipKey='putting';
      golfPreviewLabelKey='putting';
      entryBubble.style.setProperty('--golf-progress','0');
      entryBubble.classList.remove('is-scene-transitioning');
      golfPreviewPill.classList.remove('is-chip-transitioning');
      golfPreviewTitle.classList.remove('is-label-transitioning');
      setGolfPreviewScene(previewScenes.putting);
      setGolfPreviewChip(previewScenes.putting);
    }
  }

  function setGolfPreviewState(isActive){
    golfPreviewActive=isActive;
    entryBubble.classList.toggle('is-preview-active',isActive);
    if(!isActive) stopGolfPreviewAnimation(true);
  }

  function animateGolfPreview(now){
    if(!golfPreviewStart) golfPreviewStart=now;
    const elapsed=now-golfPreviewStart;
    const progress=clamp(elapsed/12600,0,1)*.4;
    applyGolfPreviewTimeline(progress);
    if(progress<.4 && golfPreviewActive){
      golfPreviewRaf=requestAnimationFrame(animateGolfPreview);
      return;
    }
    golfPreviewRaf=0;
  }

  function updateDayPill(item){
    if(item.key===currentPillKey) return;
    currentPillKey=item.key;
    const token=++pillTransitionToken;
    setDayPillWidth(item.chip);
    dayPillContent.classList.add('is-exiting');
    window.setTimeout(()=>{
      if(token!==pillTransitionToken) return;
      setPillStatus(item.status);
      dayPillText.textContent=item.chip;
      dayPillContent.classList.remove('is-exiting');
      dayPillContent.classList.add('is-entering');
      requestAnimationFrame(()=>{
        if(token!==pillTransitionToken) return;
        dayPillContent.classList.remove('is-entering');
      });
    },180);
  }

  function render(options={}){
    if(!options.keepBackground) commitStackBackground(activeIndex);
    updateDayPill(items[activeIndex]);
    if(!scoreSequenceRunning) resetPuttingScoreBlock();
    const jumpCards=[];
    cards.forEach((card,index)=>{
      const forward=wrappedDistance(index);
      const backward=(activeIndex-index+items.length)%items.length;
      let slot='is-hidden';
      if(index===activeIndex) slot='is-active';
      else if(backward===1) slot='is-prev';
      else if(forward===1) slot='is-next';
      else if(forward===2) slot='is-next2';
      const previousSlot=card.dataset.slot || 'is-hidden';
      const shouldJump=
        (previousSlot==='is-prev' && (slot==='is-next2' || slot==='is-hidden')) ||
        ((previousSlot==='is-next2' || previousSlot==='is-hidden') && slot==='is-prev');
      card.dataset.slot=slot;
      card.className='bubble-card '+slot+(shouldJump ? ' no-transition' : '');
      if(!options.keepMotionState) clearMotionState(card);
      if(shouldJump) jumpCards.push(card);
    });
    if(jumpCards.length){
      requestAnimationFrame(()=>{
        jumpCards.forEach(card=>{
          card.classList.remove('no-transition');
        });
      });
    }
    mountDayPill(cards[activeIndex]);
    mountDeleteAffordance(cards[activeIndex]);
    if(!scoreSequenceRunning && activeIndex===0){
      requestAnimationFrame(()=>{
        syncActiveCardHeight(0);
      });
    }
  }

  function renderScrub(progress){
    dragProgress=clamp(progress,-1,1);
    const previewIndex=modIndex(activeIndex+Math.round(dragProgress));
    syncStackBackground(activeIndex,dragProgress);
    updateDayPill(items[previewIndex]);
    let pillAnchorCard=null;
    let pillAnchorWidth=-1;
    cards.forEach((card,index)=>{
      const {slot,state}=scrubStateForIndex(index,dragProgress,card);
      card.dataset.slot=slot;
      card.className='bubble-card '+slot+' is-scrubbing';
      applyMotionState(card,state);
      if(state.w>pillAnchorWidth){
        pillAnchorWidth=state.w;
        pillAnchorCard=card;
      }
    });
    if(pillAnchorCard) mountDayPill(pillAnchorCard);
  }

  function settleScrub(direction){
    const wrappedIndex=direction>0
      ? modIndex(activeIndex-1)
      : direction<0
        ? modIndex(activeIndex+2)
        : null;
    activeIndex=modIndex(activeIndex+direction);
    render({keepMotionState:true,keepBackground:true});
    commitStackBackground(activeIndex);
    if(wrappedIndex!==null){
      const wrappedCard=cards[wrappedIndex];
      const finalSlot=wrappedCard.dataset.slot || 'is-hidden';
      const hiddenFinal=stateForSlot(finalSlot,wrappedCard);
      hiddenFinal.opacity=0;
      hiddenFinal.surfaceOpacity=0;
      wrappedCard.classList.add('no-transition');
      applyMotionState(wrappedCard,hiddenFinal);
    }
    requestAnimationFrame(()=>{
      cards.forEach(card=>card.classList.remove('no-transition'));
      cards.forEach(clearMotionState);
    });
    dragProgress=0;
    wheelProgress=0;
  }

  function navigate(direction){
    clearScoreSequence();
    settleScrub(direction);
  }

  function onSwipeEnd(){
    if(Math.abs(touchDeltaY)<2){
      settleScrub(0);
      return;
    }
    const direction=Math.abs(dragProgress)>=settleThreshold ? Math.sign(dragProgress) : 0;
    settleScrub(direction);
  }

  homeScreen.addEventListener('pointerdown',event=>{
    if(phone.classList.contains('is-stack-opening') || phone.classList.contains('is-stack')) return;
    ensureHomeBubbleLayout();
    const p=homePoint(event);
    const bubble=event.target.closest('[data-home-bubble]');
    const bubbleIndex=bubble ? homeBubbles.indexOf(bubble) : -1;
    homeActivePointerId=event.pointerId;
    homeGestureStartX=p.x;
    homeGestureStartY=p.y;
    homeGestureMoved=false;
    homePanVelX=0;
    homePanVelY=0;
    homePanLastTime=performance.now();
    if(bubbleIndex>=0){
      const state=homeBubbleState.get(bubble);
      homeDragIndex=bubbleIndex;
      homePanning=false;
      homeOffX=p.x-(state.x+homePanOffsetX[bubbleIndex]);
      homeOffY=p.y-(state.y+homePanOffsetY[bubbleIndex]);
      homeDragTargetX=state.x;
      homeDragTargetY=state.y;
      bubble.classList.add('is-dragging');
    }else{
      homeDragIndex=-1;
      homePanning=true;
      homePanX=p.x;
      homePanY=p.y;
      setHomePanInfluence(p);
    }
    homeScreen.setPointerCapture(event.pointerId);
    event.preventDefault();
  });

  homeScreen.addEventListener('pointermove',event=>{
    if(homeActivePointerId!==event.pointerId) return;
    const p=homePoint(event);
    const totalDx=p.x-homeGestureStartX;
    const totalDy=p.y-homeGestureStartY;
    if(Math.hypot(totalDx,totalDy)>8) homeGestureMoved=true;
    if(homeDragIndex>=0){
      homeDragTargetX=p.x-homeOffX-homePanOffsetX[homeDragIndex];
      homeDragTargetY=p.y-homeOffY-homePanOffsetY[homeDragIndex];
      return;
    }
    if(!homePanning) return;
    const now=performance.now();
    const dt=Math.max(16,now-homePanLastTime);
    const rawDx=p.x-homePanX;
    const rawDy=p.y-homePanY;
    const speed=Math.hypot(rawDx,rawDy)/dt;
    const resistance=.18+Math.min(.34,speed*1.2);
    const dx=rawDx*resistance;
    const dy=rawDy*resistance;
    for(let i=0;i<homeBubbles.length;i++){
      homePanTargetX[i]+=dx*homePanInfluence[i];
      homePanTargetY[i]+=dy*homePanInfluence[i];
    }
    clampHomePanTargets();
    homePanVelX=homePanVelX*.5+(rawDx/dt)*520*.5;
    homePanVelY=homePanVelY*.5+(rawDy/dt)*520*.5;
    homePanX=p.x;
    homePanY=p.y;
    homePanLastTime=now;
  });

  function releaseHomePointer(event){
    if(homeActivePointerId!==event.pointerId) return;
    const draggedNode=homeDragIndex>=0 ? homeBubbles[homeDragIndex] : null;
    const shouldOpen=event.type==='pointerup' && draggedNode===entryBubble && !homeGestureMoved;
    if(homeDragIndex>=0){
      const state=homeBubbleState.get(draggedNode);
      if(state){
        state.x=homeDragTargetX;
        state.y=homeDragTargetY;
      }
      draggedNode.classList.remove('is-dragging');
    }
    if(homePanning){
      for(let i=0;i<homeBubbles.length;i++){
        homePanTargetX[i]+=homePanVelX*.48*homePanInfluence[i];
        homePanTargetY[i]+=homePanVelY*.48*homePanInfluence[i];
      }
      clampHomePanTargets();
    }
    homeDragIndex=-1;
    homePanning=false;
    homeActivePointerId=null;
    homePanVelX=0;
    homePanVelY=0;
    if(homeScreen.hasPointerCapture(event.pointerId)) homeScreen.releasePointerCapture(event.pointerId);
    if(shouldOpen) openStackFromHome();
  }

  homeScreen.addEventListener('pointerup',releaseHomePointer);
  homeScreen.addEventListener('pointercancel',releaseHomePointer);

  homeScreen.addEventListener('contextmenu',event=>{
    if(!phone.classList.contains('is-stack')) event.preventDefault();
  });

  backButton.addEventListener('pointerdown',event=>{
    event.stopPropagation();
  });

  backButton.addEventListener('click',event=>{
    event.stopPropagation();
    if(deleteMode){
      exitDeleteMode();
      return;
    }
    closeStackToHome();
  });

  bubbleStartButton?.addEventListener('click',()=>{
    setGolfPreviewState(true);
    stopGolfPreviewAnimation();
    golfPreviewStart=0;
    golfPreviewSceneKey='putting';
    golfPreviewChipKey='putting';
    golfPreviewLabelKey='putting';
    setGolfPreviewScene(previewScenes.putting);
    setGolfPreviewChip(previewScenes.putting);
    applyGolfPreviewTimeline(0);
    golfPreviewRaf=requestAnimationFrame(animateGolfPreview);
  });

  startCardButton?.addEventListener('click',()=>{
    startPuttingCardSequence();
  });

  bubbleEndButton?.addEventListener('click',()=>{
    setGolfPreviewState(false);
  });

  stack.addEventListener('pointerdown',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(activePointerId!==null) return;
    event.preventDefault();
    activePointerId=event.pointerId;
    stack.setPointerCapture(event.pointerId);
    touchStartX=event.clientX;
    touchStartY=event.clientY;
    touchDeltaY=0;
    isDragging=false;
    if(deleteMode){
      stackGestureMode='delete';
      clearLongPressTimer();
      return;
    }
    stackGestureMode='pending';
    clearLongPressTimer();
    longPressTimer=window.setTimeout(()=>{
      if(activePointerId!==event.pointerId || stackGestureMode!=='pending') return;
      enterDeleteMode();
      stackGestureMode='delete';
    },longPressDelay);
  });

  stack.addEventListener('pointermove',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(event.pointerId!==activePointerId) return;
    event.preventDefault();
    const deltaX=event.clientX-touchStartX;
    touchDeltaY=event.clientY-touchStartY;
    if(stackGestureMode==='delete'){
      applyDeleteDrag(deltaX);
      return;
    }
    if(stackGestureMode==='pending'){
      if(Math.hypot(deltaX,touchDeltaY)>longPressMoveTolerance){
        clearLongPressTimer();
      }
      if(Math.abs(touchDeltaY)>Math.abs(deltaX) && Math.abs(touchDeltaY)>6){
        stackGestureMode='scrub';
        isDragging=true;
      }else if(Math.abs(deltaX)>Math.abs(touchDeltaY) && Math.abs(deltaX)>longPressMoveTolerance){
        stackGestureMode='idle';
        return;
      }else{
        return;
      }
    }
    if(stackGestureMode!=='scrub' || !isDragging) return;
    renderScrub(-touchDeltaY/swipeDistance);
  });

  stack.addEventListener('pointerup',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(event.pointerId!==activePointerId) return;
    clearLongPressTimer();
    stack.releasePointerCapture(event.pointerId);
    if(stackGestureMode==='delete'){
      if(Math.abs(deleteDragX)>=deleteCommitDistance) deleteActiveCard();
      else resetDeleteDrag();
    }else if(stackGestureMode==='scrub' && isDragging){
      onSwipeEnd();
    }else if(deleteMode){
      resetDeleteDrag();
    }
    isDragging=false;
    activePointerId=null;
    stackGestureMode='idle';
  });

  stack.addEventListener('pointercancel',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(event.pointerId!==activePointerId) return;
    clearLongPressTimer();
    stack.releasePointerCapture(event.pointerId);
    if(deleteMode) exitDeleteMode();
    else if(stackGestureMode==='scrub' && isDragging) settleScrub(0);
    isDragging=false;
    activePointerId=null;
    stackGestureMode='idle';
  });

  stack.addEventListener('contextmenu',event=>{
    event.preventDefault();
  });

  stack.addEventListener('wheel',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(deleteMode) return;
    event.preventDefault();
    if(Math.abs(event.deltaY)<16) return;
    window.clearTimeout(wheelLock);
    window.clearTimeout(wheelSettleTimer);
    wheelProgress=clamp(wheelProgress+event.deltaY/swipeDistance,-1,1);
    renderScrub(wheelProgress);
    wheelLock=window.setTimeout(()=>{
      wheelLock=null;
    },420);
    wheelSettleTimer=window.setTimeout(()=>{
      const direction=Math.abs(wheelProgress)>=settleThreshold ? Math.sign(wheelProgress) : 0;
      settleScrub(direction);
    },120);
  },{passive:false});

  window.addEventListener('keydown',event=>{
    if(!phone.classList.contains('is-stack')) return;
    if(phone.classList.contains('is-stack-closing')) return;
    if(deleteMode && event.key==='Escape'){
      exitDeleteMode();
      return;
    }
    if(deleteMode) return;
    if(event.key==='Escape') closeStackToHome();
    if(event.key==='ArrowUp') navigate(-1);
    if(event.key==='ArrowDown') navigate(1);
  });

  measureActiveHeights();
  setPillStatus(items[activeIndex].status);
  setDayPillWidth(items[activeIndex].chip);
  commitStackBackground(activeIndex);
  window.addEventListener('resize',()=>{
    measureActiveHeights();
  });
  render();
  ensureHomeBubbleLayout();
  requestAnimationFrame(renderHomeBubbles);
  setGolfPreviewScene(previewScenes.putting);
  setGolfPreviewChip(previewScenes.putting);
  setGolfPreviewState(false);
  entryBubble.addEventListener('click',event=>{
    event.preventDefault();
    event.stopPropagation();
    openStackFromHome();
  });
  entryBubble.addEventListener('keydown',event=>{
    if(event.key==='Enter' || event.key===' '){
      event.preventDefault();
      openStackFromHome();
    }
  });
})();
</script>
